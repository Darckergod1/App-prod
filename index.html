/* ═══════════════════════════════════════════════════════════════
   qrcode.local.js
   Generador de códigos QR — 100% local, sin CDN, sin llamadas de red.
   ------------------------------------------------------------------
   QUÉ ES
   Encoder QR (algoritmo de Kazuhiko Arase / "QRCode for JavaScript",
   (c) 2009, licencia MIT — es el mismo núcleo que usa la librería
   'qrcodejs' de davidshimjs) + un wrapper que dibuja el código en un
   <canvas> dentro del elemento que le indiques.

   Se extrajo y adaptó desde v2_qrincluido__CORREGIDO.html para poder
   reutilizarse en cualquier otro proyecto sin arrastrar el resto de
   esa app.

   API PÚBLICA (idéntica a qrcodejs, por si ya tenías código escrito
   contra esa librería — no hay que tocarlo):

     const qr = new QRCode(elementoOId, {
       text:         'texto o URL a codificar',   // obligatorio
       width:        200,                          // px, opcional (default 256)
       height:       200,                          // px, opcional (default 256)
       colorDark:    '#000000',                    // opcional
       colorLight:   '#ffffff',                    // opcional
       correctLevel: QRCode.CorrectLevel.H          // L | M | Q | H, opcional (default H)
     });

     qr.makeCode('otro texto');   // reemplaza el contenido del mismo QR
     qr.clear();                  // limpia el elemento

   NOTAS DE DISEÑO
   - Incluye "zona de silencio" (quiet zone) de 4 módulos alrededor
     del código. Es obligatoria por especificación: un QR sin margen
     blanco alrededor falla al escanearse con cámaras reales, aunque
     en una captura de pantalla "se vea bien". Si vas a maquetar el
     QR dentro de una tarjeta/etiqueta, NO le quites espacio alrededor
     pensando que "ya tiene margen el div contenedor": el margen debe
     estar DENTRO de la imagen del propio QR.
   - correctLevel H (30% de tolerancia a daño/manchas/dobleces) es el
     recomendable para códigos que se van a imprimir y pegar en un
     mostrador o pared.
   - No requiere ninguna dependencia ni build step: es JS plano (ES5),
     funciona con un <script> normal.
═══════════════════════════════════════════════════════════════ */

   ═══════════════════════════════════════════════════════ */

// ---- QRMode ----
var QRMode = {
    MODE_NUMBER :       1 << 0,
    MODE_ALPHA_NUM :    1 << 1,
    MODE_8BIT_BYTE :    1 << 2,
    MODE_KANJI :        1 << 3
};

// ---- QRMaskPattern ----
var QRMaskPattern = {
	PATTERN000 : 0,
	PATTERN001 : 1,
	PATTERN010 : 2,
	PATTERN011 : 3,
	PATTERN100 : 4,
	PATTERN101 : 5,
	PATTERN110 : 6,
	PATTERN111 : 7

// ---- QRMath ----
var QRMath = {

	glog : function(n) {
	
		if (n < 1) {
			throw new Error("glog(" + n + ")");
		}
		
		return QRMath.LOG_TABLE[n];
	},
	
	gexp : function(n) {
	
		while (n < 0) {
			n += 255;
		}
	
		while (n >= 256) {
			n -= 255;
		}
	
		return QRMath.EXP_TABLE[n];
	},
	
	EXP_TABLE : new Array(256),
	
	LOG_TABLE : new Array(256)

};
	
for (var i = 0; i < 8; i++) {
	QRMath.EXP_TABLE[i] = 1 << i;
}
for (var i = 8; i < 256; i++) {
	QRMath.EXP_TABLE[i] = QRMath.EXP_TABLE[i - 4]
		^ QRMath.EXP_TABLE[i - 5]
		^ QRMath.EXP_TABLE[i - 6]
		^ QRMath.EXP_TABLE[i - 8];
}
for (var i = 0; i < 255; i++) {
	QRMath.LOG_TABLE[QRMath.EXP_TABLE[i] ] = i;
}

    G15 : (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0),
    G18 : (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0),
    G15_MASK : (1 << 14) | (1 << 12) | (1 << 10)    | (1 << 4) | (1 << 1),

    getBCHTypeInfo : function(data) {
        var d = data << 10;
        while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) >= 0) {
            d ^= (QRUtil.G15 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) ) );    
        }
        return ( (data << 10) | d) ^ QRUtil.G15_MASK;
    },

    getBCHTypeNumber : function(data) {
        var d = data << 12;
        while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18) >= 0) {
            d ^= (QRUtil.G18 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18) ) );    
        }
        return (data << 12) | d;
    },

    getBCHDigit : function(data) {

        var digit = 0;

        while (data !== 0) {
            digit++;
            data >>>= 1;
        }

        return digit;
    },

    getPatternPosition : function(typeNumber) {
        return QRUtil.PATTERN_POSITION_TABLE[typeNumber - 1];
    },

    getMask : function(maskPattern, i, j) {
        
        switch (maskPattern) {
            
        case QRMaskPattern.PATTERN000 : return (i + j) % 2 === 0;
        case QRMaskPattern.PATTERN001 : return i % 2 === 0;
        case QRMaskPattern.PATTERN010 : return j % 3 === 0;
        case QRMaskPattern.PATTERN011 : return (i + j) % 3 === 0;
        case QRMaskPattern.PATTERN100 : return (Math.floor(i / 2) + Math.floor(j / 3) ) % 2 === 0;
        case QRMaskPattern.PATTERN101 : return (i * j) % 2 + (i * j) % 3 === 0;
        case QRMaskPattern.PATTERN110 : return ( (i * j) % 2 + (i * j) % 3) % 2 === 0;
        case QRMaskPattern.PATTERN111 : return ( (i * j) % 3 + (i + j) % 2) % 2 === 0;

        default :
            throw new Error("bad maskPattern:" + maskPattern);
        }
    },

    getErrorCorrectPolynomial : function(errorCorrectLength) {

        var a = new QRPolynomial([1], 0);

        for (var i = 0; i < errorCorrectLength; i++) {
            a = a.multiply(new QRPolynomial([1, QRMath.gexp(i)], 0) );
        }

        return a;
    },

    getLengthInBits : function(mode, type) {

            case QRMode.MODE_ALPHA_NUM  : return 9;
            case QRMode.MODE_8BIT_BYTE  : return 8;
            case QRMode.MODE_KANJI      : return 8;

            case QRMode.MODE_ALPHA_NUM  : return 11;
            case QRMode.MODE_8BIT_BYTE  : return 16;
            case QRMode.MODE_KANJI      : return 10;
            default :

            case QRMode.MODE_ALPHA_NUM  : return 13;
            case QRMode.MODE_8BIT_BYTE  : return 16;
            case QRMode.MODE_KANJI      : return 12;
            default :
                throw new Error("mode:" + mode);
            }

        } else {
            throw new Error("type:" + type);
        }

    getLostPoint : function(qrCode) {
        
        var moduleCount = qrCode.getModuleCount();
        var lostPoint = 0;
        var row = 0; 
        var col = 0;

        
        // LEVEL1
        
        for (row = 0; row < moduleCount; row++) {

            for (col = 0; col < moduleCount; col++) {

                var sameCount = 0;
                var dark = qrCode.isDark(row, col);

                for (var r = -1; r <= 1; r++) {

                    if (row + r < 0 || moduleCount <= row + r) {
                        continue;
                    }

                    for (var c = -1; c <= 1; c++) {

                        if (col + c < 0 || moduleCount <= col + c) {
                            continue;
                        }

                        if (r === 0 && c === 0) {
                            continue;
                        }

                        if (dark === qrCode.isDark(row + r, col + c) ) {
                            sameCount++;
                        }
                    }
                }

                if (sameCount > 5) {
                    lostPoint += (3 + sameCount - 5);
                }
            }
        }

        // LEVEL2

        for (row = 0; row < moduleCount - 1; row++) {
            for (col = 0; col < moduleCount - 1; col++) {
                var count = 0;
                if (qrCode.isDark(row,     col    ) ) count++;
                if (qrCode.isDark(row + 1, col    ) ) count++;
                if (qrCode.isDark(row,     col + 1) ) count++;
                if (qrCode.isDark(row + 1, col + 1) ) count++;
                if (count === 0 || count === 4) {
                    lostPoint += 3;
                }
            }
        }

        // LEVEL3

        for (row = 0; row < moduleCount; row++) {
            for (col = 0; col < moduleCount - 6; col++) {
                if (qrCode.isDark(row, col) && 
                        !qrCode.isDark(row, col + 1) && 
                         qrCode.isDark(row, col + 2) && 
                         qrCode.isDark(row, col + 3) && 
                         qrCode.isDark(row, col + 4) && 
                        !qrCode.isDark(row, col + 5) && 
                         qrCode.isDark(row, col + 6) ) {
                    lostPoint += 40;
                }
            }
        }

        for (col = 0; col < moduleCount; col++) {
            for (row = 0; row < moduleCount - 6; row++) {
                if (qrCode.isDark(row, col) &&
                        !qrCode.isDark(row + 1, col) &&
                         qrCode.isDark(row + 2, col) &&
                         qrCode.isDark(row + 3, col) &&
                         qrCode.isDark(row + 4, col) &&
                        !qrCode.isDark(row + 5, col) &&
                         qrCode.isDark(row + 6, col) ) {
                    lostPoint += 40;
                }
            }
        }

        // LEVEL4
        
        var darkCount = 0;

        for (col = 0; col < moduleCount; col++) {
            for (row = 0; row < moduleCount; row++) {
                if (qrCode.isDark(row, col) ) {
                    darkCount++;
                }
            }
        }
        
        var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
        lostPoint += ratio * 10;

        return lostPoint;       
    }

};


// ---- QRPolynomial ----

function QRPolynomial(num, shift) {
	if (num.length === undefined) {
		throw new Error(num.length + "/" + shift);
	}

	var offset = 0;

	while (offset < num.length && num[offset] === 0) {
		offset++;
	}

	this.num = new Array(num.length - offset + shift);
	for (var i = 0; i < num.length - offset; i++) {
		this.num[i] = num[i + offset];
	}
}

QRPolynomial.prototype = {

	get : function(index) {
		return this.num[index];
	},
	
	getLength : function() {
		return this.num.length;
	},
	
	multiply : function(e) {
	
		var num = new Array(this.getLength() + e.getLength() - 1);
	
		for (var i = 0; i < this.getLength(); i++) {
			for (var j = 0; j < e.getLength(); j++) {
				num[i + j] ^= QRMath.gexp(QRMath.glog(this.get(i) ) + QRMath.glog(e.get(j) ) );
			}
		}
	
		return new QRPolynomial(num, 0);
	},
	
	mod : function(e) {
	
		if (this.getLength() - e.getLength() < 0) {
			return this;
		}
	
		var ratio = QRMath.glog(this.get(0) ) - QRMath.glog(e.get(0) );
	
		var num = new Array(this.getLength() );
		
		for (var i = 0; i < this.getLength(); i++) {
			num[i] = this.get(i);
		}
		
		for (var x = 0; x < e.getLength(); x++) {
			num[x] ^= QRMath.gexp(QRMath.glog(e.get(x) ) + ratio);
		}
	
		// recursive call
		return new QRPolynomial(num, 0).mod(e);
	}
};

QRRSBlock.getRSBlocks = function(typeNumber, errorCorrectLevel) {
	
	var rsBlock = QRRSBlock.getRsBlockTable(typeNumber, errorCorrectLevel);
	
	if (rsBlock === undefined) {
		throw new Error("bad rs block @ typeNumber:" + typeNumber + "/errorCorrectLevel:" + errorCorrectLevel);
	}

	var length = rsBlock.length / 3;
	
	var list = [];
	
	for (var i = 0; i < length; i++) {

		var count = rsBlock[i * 3 + 0];
		var totalCount = rsBlock[i * 3 + 1];
		var dataCount  = rsBlock[i * 3 + 2];

		for (var j = 0; j < count; j++) {
			list.push(new QRRSBlock(totalCount, dataCount) );	
		}
	}
	
	return list;
};

QRRSBlock.getRsBlockTable = function(typeNumber, errorCorrectLevel) {

	switch(errorCorrectLevel) {
	case QRErrorCorrectLevel.L :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 0];
	case QRErrorCorrectLevel.M :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 1];
	case QRErrorCorrectLevel.Q :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 2];
	case QRErrorCorrectLevel.H :
		return QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 3];
	default :
		return undefined;
	}
};


// ---- QR8bitByte ----

function QR8bitByte(data) {
	this.mode = QRMode.MODE_8BIT_BYTE;
	this.data = data;
}

QR8bitByte.prototype = {

	getLength : function() {
		return this.data.length;
	},
	
	write : function(buffer) {
		for (var i = 0; i < this.data.length; i++) {
			// not JIS ...
			buffer.put(this.data.charCodeAt(i), 8);
		}
	}
};


// ---- QRBitBuffer ----
function QRBitBuffer() {
	this.buffer = [];
	this.length = 0;
}

QRBitBuffer.prototype = {

	get : function(index) {
		var bufIndex = Math.floor(index / 8);
		return ( (this.buffer[bufIndex] >>> (7 - index % 8) ) & 1) == 1;
	},
	
	put : function(num, length) {
		for (var i = 0; i < length; i++) {
			this.putBit( ( (num >>> (length - i - 1) ) & 1) == 1);
		}
	},
	
	getLengthInBits : function() {
		return this.length;
	},
	
	putBit : function(bit) {
	
		var bufIndex = Math.floor(this.length / 8);
		if (this.buffer.length <= bufIndex) {
			this.buffer.push(0);
		}
	
		if (bit) {
			this.buffer[bufIndex] |= (0x80 >>> (this.length % 8) );
		}
	
		this.length++;
	}
};

function QRCodeModel(typeNumber, errorCorrectLevel) {
	this.typeNumber = typeNumber;
	this.errorCorrectLevel = errorCorrectLevel;
	this.modules = null;
	this.moduleCount = 0;
	this.dataCache = null;
	this.dataList = [];
}

QRCodeModel.prototype = {
	
	addData : function(data) {
		var newData = new QR8bitByte(data);
		this.dataList.push(newData);
		this.dataCache = null;
	},
	
	isDark : function(row, col) {
		if (row < 0 || this.moduleCount <= row || col < 0 || this.moduleCount <= col) {
			throw new Error(row + "," + col);
		}
		return this.modules[row][col];
	},

	getModuleCount : function() {
		return this.moduleCount;
	},
	
	make : function() {
		// Calculate automatically typeNumber if provided is < 1
		if (this.typeNumber < 1 ){
			var typeNumber = 1;
			for (typeNumber = 1; typeNumber < 40; typeNumber++) {
				var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, this.errorCorrectLevel);

				var buffer = new QRBitBuffer();
				var totalDataCount = 0;
				for (var i = 0; i < rsBlocks.length; i++) {
					totalDataCount += rsBlocks[i].dataCount;
				}

				for (var x = 0; x < this.dataList.length; x++) {
					var data = this.dataList[x];
					buffer.put(data.mode, 4);
					buffer.put(data.getLength(), QRUtil.getLengthInBits(data.mode, typeNumber) );
					data.write(buffer);
				}
				if (buffer.getLengthInBits() <= totalDataCount * 8)
					break;
			}
			this.typeNumber = typeNumber;
		}
		this.makeImpl(false, this.getBestMaskPattern() );
	},
	
	makeImpl : function(test, maskPattern) {
		
		this.moduleCount = this.typeNumber * 4 + 17;
		this.modules = new Array(this.moduleCount);
		
		for (var row = 0; row < this.moduleCount; row++) {
			
			this.modules[row] = new Array(this.moduleCount);
			
			for (var col = 0; col < this.moduleCount; col++) {
				this.modules[row][col] = null;//(col + row) % 3;
			}
		}
	
		this.setupPositionProbePattern(0, 0);
		this.setupPositionProbePattern(this.moduleCount - 7, 0);
		this.setupPositionProbePattern(0, this.moduleCount - 7);
		this.setupPositionAdjustPattern();
		this.setupTimingPattern();
		this.setupTypeInfo(test, maskPattern);
		
		if (this.typeNumber >= 7) {
			this.setupTypeNumber(test);
		}
	
		if (this.dataCache === null) {
			this.dataCache = QRCodeModel.createData(this.typeNumber, this.errorCorrectLevel, this.dataList);
		}
	
		this.mapData(this.dataCache, maskPattern);
	},

	setupPositionProbePattern : function(row, col)  {
		
		for (var r = -1; r <= 7; r++) {
			
			if (row + r <= -1 || this.moduleCount <= row + r) continue;
			
			for (var c = -1; c <= 7; c++) {
				
				if (col + c <= -1 || this.moduleCount <= col + c) continue;
				
				if ( (0 <= r && r <= 6 && (c === 0 || c === 6) ) || 
                     (0 <= c && c <= 6 && (r === 0 || r === 6) ) || 
                     (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
					this.modules[row + r][col + c] = true;
				} else {
					this.modules[row + r][col + c] = false;
				}
			}		
		}		
	},
	
	getBestMaskPattern : function() {
	
		var minLostPoint = 0;
		var pattern = 0;
	
		for (var i = 0; i < 8; i++) {
			
			this.makeImpl(true, i);
	
			var lostPoint = QRUtil.getLostPoint(this);
	
			if (i === 0 || minLostPoint >  lostPoint) {
				minLostPoint = lostPoint;
				pattern = i;
			}
		}
	
		return pattern;
	},
	
	createMovieClip : function(target_mc, instance_name, depth) {
	
		var qr_mc = target_mc.createEmptyMovieClip(instance_name, depth);
		var cs = 1;
	
		this.make();

		for (var row = 0; row < this.modules.length; row++) {
			
			var y = row * cs;
			
			for (var col = 0; col < this.modules[row].length; col++) {
	
				var x = col * cs;
				var dark = this.modules[row][col];
			
				if (dark) {
					qr_mc.beginFill(0, 100);
					qr_mc.moveTo(x, y);
					qr_mc.lineTo(x + cs, y);
					qr_mc.lineTo(x + cs, y + cs);
					qr_mc.lineTo(x, y + cs);
					qr_mc.endFill();
				}
			}
		}
		
		return qr_mc;
	},

	setupTimingPattern : function() {
		
		for (var r = 8; r < this.moduleCount - 8; r++) {
			if (this.modules[r][6] !== null) {
				continue;
			}
			this.modules[r][6] = (r % 2 === 0);
		}
	
		for (var c = 8; c < this.moduleCount - 8; c++) {
			if (this.modules[6][c] !== null) {
				continue;
			}
			this.modules[6][c] = (c % 2 === 0);
		}
	},
	
	setupPositionAdjustPattern : function() {
	
		var pos = QRUtil.getPatternPosition(this.typeNumber);
		
		for (var i = 0; i < pos.length; i++) {
		
			for (var j = 0; j < pos.length; j++) {
			
				var row = pos[i];
				var col = pos[j];
				
				if (this.modules[row][col] !== null) {
					continue;
				}
				
				for (var r = -2; r <= 2; r++) {
				
					for (var c = -2; c <= 2; c++) {
					
						if (Math.abs(r) === 2 || 
                            Math.abs(c) === 2 ||
                            (r === 0 && c === 0) ) {
							this.modules[row + r][col + c] = true;
						} else {
							this.modules[row + r][col + c] = false;
						}
					}
				}
			}
		}
	},
	
	setupTypeNumber : function(test) {
	
		var bits = QRUtil.getBCHTypeNumber(this.typeNumber);
        var mod;
	
		for (var i = 0; i < 18; i++) {
			mod = (!test && ( (bits >> i) & 1) === 1);
			this.modules[Math.floor(i / 3)][i % 3 + this.moduleCount - 8 - 3] = mod;
		}
	
		for (var x = 0; x < 18; x++) {
			mod = (!test && ( (bits >> x) & 1) === 1);
			this.modules[x % 3 + this.moduleCount - 8 - 3][Math.floor(x / 3)] = mod;
		}
	},
	
	setupTypeInfo : function(test, maskPattern) {
	
		var data = (this.errorCorrectLevel << 3) | maskPattern;
		var bits = QRUtil.getBCHTypeInfo(data);
        var mod;
	
		// vertical		
		for (var v = 0; v < 15; v++) {
	
			mod = (!test && ( (bits >> v) & 1) === 1);
	
			if (v < 6) {
				this.modules[v][8] = mod;
			} else if (v < 8) {
				this.modules[v + 1][8] = mod;
			} else {
				this.modules[this.moduleCount - 15 + v][8] = mod;
			}
		}
	
		// horizontal
		for (var h = 0; h < 15; h++) {
	
			mod = (!test && ( (bits >> h) & 1) === 1);
			
			if (h < 8) {
				this.modules[8][this.moduleCount - h - 1] = mod;
			} else if (h < 9) {
				this.modules[8][15 - h - 1 + 1] = mod;
			} else {
				this.modules[8][15 - h - 1] = mod;
			}
		}
	
		// fixed module
		this.modules[this.moduleCount - 8][8] = (!test);
	
	},
	
	mapData : function(data, maskPattern) {
		
		var inc = -1;
		var row = this.moduleCount - 1;
		var bitIndex = 7;
		var byteIndex = 0;
		
		for (var col = this.moduleCount - 1; col > 0; col -= 2) {
	
			if (col === 6) col--;
	
			while (true) {
	
				for (var c = 0; c < 2; c++) {
					
					if (this.modules[row][col - c] === null) {
						
						var dark = false;
	
						if (byteIndex < data.length) {
							dark = ( ( (data[byteIndex] >>> bitIndex) & 1) === 1);
						}
	
						var mask = QRUtil.getMask(maskPattern, row, col - c);
	
						if (mask) {
							dark = !dark;
						}
						
						this.modules[row][col - c] = dark;
						bitIndex--;
	
						if (bitIndex === -1) {
							byteIndex++;
							bitIndex = 7;
						}
					}
				}
								
				row += inc;
	
				if (row < 0 || this.moduleCount <= row) {
					row -= inc;
					inc = -inc;
					break;
				}
			}
		}
		
	}

};

QRCodeModel.PAD0 = 0xEC;
QRCodeModel.PAD1 = 0x11;

QRCodeModel.createData = function(typeNumber, errorCorrectLevel, dataList) {
	
	var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectLevel);
	
	var buffer = new QRBitBuffer();
	
	for (var i = 0; i < dataList.length; i++) {
		var data = dataList[i];
		buffer.put(data.mode, 4);
		buffer.put(data.getLength(), QRUtil.getLengthInBits(data.mode, typeNumber) );
		data.write(buffer);
	}

	// calc num max data.
	var totalDataCount = 0;
	for (var x = 0; x < rsBlocks.length; x++) {
		totalDataCount += rsBlocks[x].dataCount;
	}

	if (buffer.getLengthInBits() > totalDataCount * 8) {
		throw new Error("code length overflow. (" + 
            buffer.getLengthInBits() + 
            ">" +  
            totalDataCount * 8 + 
            ")");
	}

	// end code
	if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
		buffer.put(0, 4);
	}

	// padding
	while (buffer.getLengthInBits() % 8 !== 0) {
		buffer.putBit(false);
	}

	// padding
	while (true) {
		
		if (buffer.getLengthInBits() >= totalDataCount * 8) {
			break;
		}
		buffer.put(QRCodeModel.PAD0, 8);
		
		if (buffer.getLengthInBits() >= totalDataCount * 8) {
			break;
		}
		buffer.put(QRCodeModel.PAD1, 8);
	}

	return QRCodeModel.createBytes(buffer, rsBlocks);
};

QRCodeModel.createBytes = function(buffer, rsBlocks) {

	var offset = 0;
	
	var maxDcCount = 0;
	var maxEcCount = 0;
	
	var dcdata = new Array(rsBlocks.length);
	var ecdata = new Array(rsBlocks.length);
	
	for (var r = 0; r < rsBlocks.length; r++) {

		var dcCount = rsBlocks[r].dataCount;
		var ecCount = rsBlocks[r].totalCount - dcCount;

		maxDcCount = Math.max(maxDcCount, dcCount);
		maxEcCount = Math.max(maxEcCount, ecCount);
		
		dcdata[r] = new Array(dcCount);
		
		for (var i = 0; i < dcdata[r].length; i++) {
			dcdata[r][i] = 0xff & buffer.buffer[i + offset];
		}
		offset += dcCount;
		
		var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
		var rawPoly = new QRPolynomial(dcdata[r], rsPoly.getLength() - 1);

		var modPoly = rawPoly.mod(rsPoly);
		ecdata[r] = new Array(rsPoly.getLength() - 1);
		for (var x = 0; x < ecdata[r].length; x++) {
            var modIndex = x + modPoly.getLength() - ecdata[r].length;
			ecdata[r][x] = (modIndex >= 0)? modPoly.get(modIndex) : 0;
		}

	}
	
	var totalCodeCount = 0;
	for (var y = 0; y < rsBlocks.length; y++) {
		totalCodeCount += rsBlocks[y].totalCount;
	}

	var data = new Array(totalCodeCount);
	var index = 0;

	for (var z = 0; z < maxDcCount; z++) {
		for (var s = 0; s < rsBlocks.length; s++) {
			if (z < dcdata[s].length) {
				data[index++] = dcdata[s][z];
			}
		}
	}

	for (var xx = 0; xx < maxEcCount; xx++) {
		for (var t = 0; t < rsBlocks.length; t++) {
			if (xx < ecdata[t].length) {
				data[index++] = ecdata[t][xx];
			}
		}
	}

	return data;

};

return { QRCodeModel: QRCodeModel, ErrorCorrectLevel: QRErrorCorrectLevel };
})();

/* ── Wrapper con la misma API pública que 'qrcodejs' (davidshimjs) ──
   new QRCode(el, {text,width,height,colorDark,colorLight,correctLevel})
   Así el resto del código de la app (printClientQR, etc.) no cambia. */
(function(){
  function QRCode(el, opts) {
    if (typeof opts === 'string') opts = { text: opts };
    opts = Object.assign({
      width: 256, height: 256,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRLib.ErrorCorrectLevel.H
    }, opts || {});
    this._el   = (typeof el === 'string') ? document.getElementById(el) : el;
    this._opts = opts;
    this._draw(opts.text);
  }
  QRCode.CorrectLevel = QRLib.ErrorCorrectLevel; // {L,M,Q,H}
  QRCode.prototype.clear = function () { this._el.innerHTML = ''; };
  QRCode.prototype.makeCode = function (text) { this.clear(); this._draw(text); };
  QRCode.prototype._draw = function (text) {
    const qr = new QRLib.QRCodeModel(-1, this._opts.correctLevel);
    qr.addData(text);
    qr.make();
    const n = qr.getModuleCount();
    // Zona de silencio obligatoria: un QR sin margen blanco alrededor
    // suele fallar al escanearse con cámaras reales, aunque en una
    // captura de pantalla perfecta "se vea bien". La especificación
    // pide un mínimo de 4 módulos de margen en cada lado.
    const QUIET = 4;
    const totalModules = n + QUIET * 2;
    const canvas = document.createElement('canvas');
    canvas.width = this._opts.width;
    canvas.height = this._opts.height;
    const ctx = canvas.getContext('2d');
    const cell = this._opts.width / totalModules;
    ctx.fillStyle = this._opts.colorLight;
    ctx.fillRect(0, 0, this._opts.width, this._opts.height);
    ctx.fillStyle = this._opts.colorDark;
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect((c+QUIET)*cell, (r+QUIET)*cell, Math.ceil(cell), Math.ceil(cell));
        }
      }
    }
    this._el.appendChild(canvas);
  };
  window.QRCode = QRCode;
})();

/* ── Escáner de código de barras (cámara) ── */
function BarcodeScanner({onDetected,onClose}){
  const [elId]=useState(()=>'scanner-'+uid());
  const [err,setErr]=useState('');
  useEffect(()=>{
    if(typeof Html5Qrcode==='undefined'){ setErr('No se pudo cargar la librería de escaneo. Revisa tu conexión a internet.'); return; }
    let scanner=null, stopped=false, cancelled=false;
    (async()=>{
      try{
        // Prioriza formatos de código de barras (EAN/UPC/CODE128/etc.) en vez de solo QR
        const formatOpts=typeof Html5QrcodeSupportedFormats!=='undefined'?{
          formatsToSupport:[
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODABAR,
            Html5QrcodeSupportedFormats.ITF,
            Html5QrcodeSupportedFormats.QR_CODE,
          ],
          verbose:false
        }:{verbose:false};
        scanner=new Html5Qrcode(elId,formatOpts);
        await scanner.start(
          {facingMode:'environment'},
          {
            fps:15,
            // Caja de escaneo amplia y adaptable al tamaño real de la vista de cámara (mejor para códigos de barras horizontales)
            qrbox:(vw,vh)=>{
              const base=Math.floor(Math.min(vw,vh)*0.9);
              return {width:Math.max(base,240),height:Math.max(Math.floor(base*0.5),110)};
            },
            // Usa el detector nativo del navegador cuando está disponible (más rápido/preciso en Chrome Android)
            experimentalFeatures:{useBarCodeDetectorIfSupported:true}
          },
          (decodedText)=>{
            if(stopped||cancelled) return;
            stopped=true;
            if(navigator.vibrate) navigator.vibrate(80);
            scanner.stop().then(()=>scanner.clear()).catch(()=>{});
            onDetected(decodedText);
          },
          ()=>{}
        );
      }catch(e){ if(!cancelled) setErr('No se pudo acceder a la cámara. Revisa los permisos del navegador.'); }
    })();
    return ()=>{ cancelled=true; if(scanner){ scanner.stop().then(()=>scanner.clear()).catch(()=>{}); } };
  },[]);
  return <Modal title="📷 Escanear código de barras" onClose={onClose}>
    {err
      ?<div style={{fontSize:13,color:'#f87171',textAlign:'center',padding:'24px 0'}}>{err}</div>
      :<div id={elId} style={{width:'100%',borderRadius:10,overflow:'hidden',background:'#000'}}/>}
    <div style={{fontSize:11,color:'#64748b',textAlign:'center',marginTop:10}}>Mantén el código recto, bien iluminado y a unos 10–15cm de la cámara</div>
  </Modal>;
}

function Productos({productos,currentUser}){
  const isAdmin=currentUser?.role==='admin';
  const [sel,setSel]=useState([]);
  const [q,setQ]=useState('');
  const [form,setForm]=useState(null);
  const [scanOpen,setScanOpen]=useState(false);
  const [saving,setSaving]=useState(false);
  const [histOpen,setHistOpen]=useState(false);
  const list=productos.filter(p=>p.nombre.toLowerCase().includes(q.toLowerCase()));
  const allSel=list.length>0&&sel.length===list.length;
  const togSel=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const togAll=()=>setSel(allSel?[]:list.map(p=>p.id));
  const delSel=async()=>{
    await Promise.all(sel.map(id=>db.collection('productos').doc(id).delete()));
    setSel([]);
  };
  const logInventario=(productoId,productoNombre,stockAnterior,stockNuevo,motivo)=>{
    if(stockAnterior===stockNuevo) return Promise.resolve();
    return db.collection('inventario_historial').add({
      productoId,productoNombre,stockAnterior,stockNuevo,diferencia:stockNuevo-stockAnterior,
      motivo:motivo||'Sin especificar',
      usuarioNombre:currentUser?.nombre||'',usuarioEmail:currentUser?.email||'',
      fecha:new Date().toISOString()
    });
  };
  const save=async()=>{
    if(!form.nombre||form.precio===''||form.precio===undefined){ alert('Nombre y precio son obligatorios'); return; }
    setSaving(true);
    const nuevoStock=+form.stock||0;
    const item={nombre:form.nombre,precio:+form.precio,stock:nuevoStock,unidad:form.unidad,codigoBarras:form.codigoBarras||''};
    if(form.codigoBarras){
      const existente=productos.find(p=>p.codigoBarras===form.codigoBarras&&p.id!==form.id);
      if(existente){ alert(`❌ El código de barras "${form.codigoBarras}" ya está asignado a "${existente.nombre}"`); setSaving(false); return; }
    }
    try{
      if(form.id){
        const anterior=productos.find(p=>p.id===form.id);
        await db.collection('productos').doc(form.id).update(item);
        if(anterior) await logInventario(form.id,form.nombre,anterior.stock,nuevoStock,form.motivo);
      }else{
        const ref=await db.collection('productos').add(item);
        await logInventario(ref.id,form.nombre,0,nuevoStock,form.motivo||'Alta de producto');
      }
      setForm(null);
    }catch(e){ alert('Error al guardar: '+e.message); }
    setSaving(false);
  };
  return <div style={{padding:'16px 12px'}}>
    <Row style={{justifyContent:'space-between',marginBottom:12}}>
      <div style={{fontSize:20,fontWeight:800}}>📦 Productos</div>
      <Row style={{gap:6}}>
        {isAdmin&&<BOut onClick={()=>setHistOpen(true)}>📋 Historial</BOut>}
        <BFill onClick={()=>setForm({nombre:'',precio:'',stock:'',unidad:'',codigoBarras:'',motivo:''})}>+ Nuevo</BFill>
      </Row>
    </Row>
    <Inp placeholder="🔍 Buscar..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
    {sel.length>0&&<Row style={{marginBottom:10,background:'#450a0a',borderRadius:8,padding:'8px 12px'}}>
      <span style={{flex:1,fontSize:13,color:'#fca5a5'}}>{sel.length} seleccionado(s)</span>
      <BOut onClick={delSel} color="#ef4444">🗑 Eliminar</BOut>
    </Row>}
    <Row style={{paddingLeft:4,marginBottom:6}}>
      <button onClick={togAll} style={{background:'none',border:'none',color:allSel?'#38bdf8':'#94a3b8',cursor:'pointer',padding:0,display:'flex'}}>
        {allSel?<ChkSq/>:<SqI/>}
      </button>
      <span style={{fontSize:11,color:'#64748b'}}>Seleccionar todos</span>
    </Row>
    {list.map(p=><Card key={p.id} style={{display:'flex',alignItems:'flex-start',gap:10}}>
      <button onClick={()=>togSel(p.id)} style={{background:'none',border:'none',color:sel.includes(p.id)?'#38bdf8':'#475569',cursor:'pointer',padding:0,marginTop:2,flexShrink:0,display:'flex'}}>

          <span style={{fontWeight:800,color:'#38bdf8',fontSize:14}}>{fmt(p.precio)}</span>
        </Row>
        <Row style={{marginTop:4}}><Tag color={p.stock<10?'#ef4444':'#22c55e'}>{p.stock} {p.unidad}</Tag></Row>
        {p.codigoBarras&&<div style={{fontSize:10,color:'#475569',marginTop:3}}>🏷️ {p.codigoBarras}</div>}
      </div>
      <Row style={{gap:4,flexShrink:0}}>

      <Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Row style={{gap:10,marginBottom:10}}>
        <div style={{flex:1}}><Lbl>Precio ($)</Lbl><Inp type="number" value={form.precio} onChange={e=>setForm(f=>({...f,precio:e.target.value}))}/></div>
        <div style={{flex:1}}><Lbl>Stock</Lbl><Inp type="number" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/></div>
      </Row>
      <Lbl>Unidad</Lbl>
      <Inp value={form.unidad} onChange={e=>setForm(f=>({...f,unidad:e.target.value}))} placeholder="garrafón, bolsa…" style={{marginBottom:10}}/>
      <Lbl>Código de barras</Lbl>
      <Row style={{gap:8,marginBottom:10}}>
        <Inp value={form.codigoBarras||''} onChange={e=>setForm(f=>({...f,codigoBarras:e.target.value}))} placeholder="Escanea o escribe el código" style={{flex:1}}/>
        <BOut onClick={()=>setScanOpen(true)} style={{flexShrink:0,padding:'8px 12px'}}>📷</BOut>
      </Row>
      <Lbl>Motivo del cambio de inventario (opcional)</Lbl>
      <Inp value={form.motivo||''} onChange={e=>setForm(f=>({...f,motivo:e.target.value}))} placeholder="Ej. compra a proveedor, merma, conteo físico…" style={{marginBottom:6}}/>
      <div style={{fontSize:11,color:'#64748b',marginBottom:16}}>Se registra en el historial de inventario si cambias la cantidad de stock.</div>
      <BFill onClick={save} style={{width:'100%'}} disabled={saving}>{saving?'Guardando…':'💾 Guardar'}</BFill>
    </Modal>}
    {scanOpen&&<BarcodeScanner onDetected={code=>{setForm(f=>({...f,codigoBarras:code}));setScanOpen(false);}} onClose={()=>setScanOpen(false)}/>}
    {histOpen&&<InventarioHistorial onClose={()=>setHistOpen(false)}/>}
  </div>;
}

/* ── Clientes ── */
function Clientes({clientes,notas,creditos}){
  const [filtro,setFiltro]=useState('activos');
  const [q,setQ]=useState('');
  const [form,setForm]=useState(null);
  const [histId,setHistId]=useState(null);
  const cmap=creditos.reduce((m,c)=>{ if(c.saldo>0)m[c.clienteId]=(m[c.clienteId]||0)+c.saldo; return m; },{});
  const list=clientes
    .filter(c=>filtro==='activos'?c.activo:filtro==='inactivos'?!c.activo:!!cmap[c.id])
    .filter(c=>c.nombre.toLowerCase().includes(q.toLowerCase()));
  const save=async()=>{
    if(!form.nombre) return;
    const item={nombre:form.nombre,telefono:form.telefono||'',domicilio:form.domicilio||'',activo:form.activo!==undefined?form.activo:true};
    if(form.id) await db.collection('clientes').doc(form.id).update(item);
    else await db.collection('clientes').add(item);
    setForm(null);
  };
  return <div style={{padding:'16px 12px'}}>
    <Row style={{justifyContent:'space-between',marginBottom:12}}>
      <div style={{fontSize:20,fontWeight:800}}>👥 Clientes</div>
      <BFill onClick={()=>setForm({nombre:'',telefono:'',domicilio:''})}>+ Nuevo</BFill>
    </Row>
    <Inp placeholder="🔍 Buscar…" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
    <Row style={{gap:6,marginBottom:12}}>
      {[['activos','Activos'],['credito','Crédito'],['inactivos','Inactivos']].map(([v,l])=>(
        <button key={v} onClick={()=>setFiltro(v)} style={{flex:1,padding:'7px 2px',borderRadius:8,border:'none',background:filtro===v?'#38bdf8':'#1e293b',color:filtro===v?'#0f172a':'#94a3b8',fontSize:11,fontWeight:700,cursor:'pointer'}}>{l}</button>
      ))}
    </Row>
    {list.map(c=><Card key={c.id} style={{opacity:c.activo?1:0.65}}>
      <Row style={{justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1,minWidth:0}}>
          <Row style={{flexWrap:'wrap',gap:4}}>
            <span style={{fontWeight:700,fontSize:14}}>{c.nombre}</span>
            {!c.activo&&<Tag color="#94a3b8">Inactivo</Tag>}
            {cmap[c.id]&&<Tag color="#f59e0b">💳 {fmt(cmap[c.id])}</Tag>}
          </Row>
          <div style={{fontSize:12,color:'#94a3b8',marginTop:3}}>📱 {c.telefono||'—'}</div>
          <div style={{fontSize:12,color:'#94a3b8'}}>📍 {c.domicilio||'—'}</div>
        </div>
        <div style={{display:'flex',gap:4,flexShrink:0}}>
          <button onClick={()=>imprimirQRCliente(c)} title="Imprimir QR" style={{background:'#3b0764',border:'none',color:'#c084fc',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>🖨️</button>
          <button onClick={()=>setForm({...c})} style={{background:'#172554',border:'none',color:'#60a5fa',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>✏️</button>
          <button onClick={()=>db.collection('clientes').doc(c.id).update({activo:!c.activo})} style={{background:c.activo?'#450a0a':'#14532d',border:'none',color:c.activo?'#f87171':'#4ade80',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>{c.activo?'🚫':'✅'}</button>
          <button onClick={()=>setHistId(histId===c.id?null:c.id)} style={{background:'#042f2e',border:'none',color:'#34d399',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>📋</button>
        </div>
      </Row>
      {histId===c.id&&<div style={{marginTop:10,borderTop:'1px solid #334155',paddingTop:8}}>
        <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:6}}>HISTORIAL DE PEDIDOS</div>
        {notas.filter(n=>n.clienteId===c.id).length===0
          ?<div style={{fontSize:12,color:'#475569'}}>Sin pedidos aún</div>
          :notas.filter(n=>n.clienteId===c.id).map(n=><Row key={n.id} style={{justifyContent:'space-between',fontSize:12,paddingBottom:5,borderBottom:'1px solid #0f172a',marginBottom:4,flexWrap:'wrap',gap:4}}>
            <span style={{color:'#64748b'}}>{fDate(n.fecha)}</span>
            <span style={{flex:1,paddingLeft:4}}>{n.items.length} prod.</span>
            <span style={{color:'#38bdf8',fontWeight:700}}>{fmt(n.total)}</span>
            <Tag color={n.formaPago==='credito'?'#f59e0b':'#22c55e'}>{n.formaPago}</Tag>
          </Row>)
        }
      </div>}
    </Card>)}
    {form&&<Modal title={form.id?'Editar Cliente':'Nuevo Cliente'} onClose={()=>setForm(null)}>
      <Lbl>Nombre</Lbl><Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Lbl>Teléfono</Lbl><Inp type="tel" value={form.telefono} onChange={e=>setForm(f=>({...f,telefono:e.target.value}))} style={{marginBottom:10}}/>
