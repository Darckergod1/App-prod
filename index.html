/* ── Crear Nota ── */
function CrearNota({productos,clientes}){
  const [cliOpen,setCliOpen]=useState(true);
  const [prodOpen,setProdOpen]=useState(false);
  const [cliMode,setCliMode]=useState('buscar');
  const [cliSearch,setCliSearch]=useState('');
  const [cliSel,setCliSel]=useState(null);
  const [nuevoC,setNuevoC]=useState({nombre:'',telefono:''});
  const [cart,setCart]=useState([]);
  const [pago,setPago]=useState('contado');
  const [done,setDone]=useState(null);
  const [saving,setSaving]=useState(false);
  const cliFilt=clientes.filter(c=>c.activo&&c.nombre.toLowerCase().includes(cliSearch.toLowerCase()));
  const addCart=p=>setCart(c=>{ const ex=c.find(x=>x.id===p.id); return ex?c.map(x=>x.id===p.id?{...x,cant:x.cant+1}:x):[...c,{id:p.id,nombre:p.nombre,precio:p.precio,cant:1}]; });
  const updQty=(id,v)=>{ if(v<1){setCart(c=>c.filter(x=>x.id!==id));return;} setCart(c=>c.map(x=>x.id===id?{...x,cant:v}:x)); };
  const total=cart.reduce((s,x)=>s+x.precio*x.cant,0);
  const cliente=cliMode==='nuevo'?nuevoC:cliSel;
  const canSave=cliente?.nombre&&cart.length>0;
  const makeWA=(cl,items,tot,fp)=>{
    const lines=items.map(x=>`• ${x.nombre} x${x.cant} = ${fmt(x.precio*x.cant)}`).join('\n');
    const text=`🧾 *PEDIDO*\n👤 ${cl.nombre}\n\n${lines}\n\n💰 *Total: ${fmt(tot)}*\nPago: ${fp}`;
    let telefono=(cl.telefono||'').replace(/\D/g,'');
    if(!telefono.startsWith('52')&&telefono.length<=10) telefono='52'+telefono;
    return `https://wa.me/${telefono}?text=${encodeURIComponent(text)}`;
  };
  const guardar=async()=>{
    if(!canSave) return;
    setSaving(true);
    try{
      let cl=cliSel;
      if(cliMode==='nuevo'){
        const ref=await db.collection('clientes').add({nombre:nuevoC.nombre,telefono:nuevoC.telefono||'',domicilio:'',activo:true});
        cl={id:ref.id,nombre:nuevoC.nombre,telefono:nuevoC.telefono||''};
      }

      const notaRef=db.collection('notas').doc();
      const credRef=pago==='credito'?db.collection('creditos').doc():null;
      const nota={fecha:new Date().toISOString(),clienteId:cl.id,clienteNombre:cl.nombre,clienteTelefono:cl.telefono||'',items:cart.map(x=>({...x})),total,formaPago:pago};

      await db.runTransaction(async(transaction)=>{
        // Lecturas primero (requisito de Firestore) para escribir el stock resultante de forma consistente
        const prodRefs=cart.map(item=>db.collection('productos').doc(item.id));
        const snaps=await Promise.all(prodRefs.map(ref=>transaction.get(ref)));

        transaction.set(notaRef,nota);
        if(credRef) transaction.set(credRef,{notaId:notaRef.id,clienteId:cl.id,clienteNombre:cl.nombre,fecha:nota.fecha,total,saldo:total,abonos:[]});
        // Descuenta stock sin bloquear la venta (puede quedar negativo; producción lo controla aparte)
        snaps.forEach((snap,i)=>{
          const item=cart[i];
          const stockActual=snap.exists?(snap.data().stock||0):0;
          transaction.update(prodRefs[i],{stock:stockActual-item.cant});
        });
      });

      setDone({nota:{...nota,id:notaRef.id},cl});
      setCart([]); setCliSel(null); setNuevoC({nombre:'',telefono:''}); setCliMode('buscar');
    }catch(e){ alert('❌ Error al guardar el pedido: '+e.message); }
    setSaving(false);
  };
  if(done) return <div style={{padding:24,textAlign:'center'}}>
    <div style={{fontSize:52,marginBottom:8}}>✅</div>
    <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Pedido guardado</div>
    <div style={{color:'#94a3b8',marginBottom:24}}>{done.cl.nombre} · {fmt(done.nota.total)}</div>
    {done.cl.telefono&&<BFill onClick={()=>window.open(makeWA(done.cl,done.nota.items,done.nota.total,done.nota.formaPago),'_blank')} bg="#25d366" style={{width:'100%',marginBottom:12,fontSize:15}}>📲 Enviar ticket por WhatsApp</BFill>}
    <BOut onClick={()=>setDone(null)} color="#38bdf8" style={{width:'100%'}}>+ Nuevo pedido</BOut>
  </div>;
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>🧾 Crear Pedido</div>
    <Card>
      <button onClick={()=>setCliOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700}}>👤 Cliente {((cliMode==='nuevo'&&nuevoC.nombre)||cliSel)?'✅':''}</span>
          {cliOpen?<CUp/>:<CDown/>}
        </Row>
        {!cliOpen&&cliSel&&<div style={{fontSize:12,color:'#38bdf8',marginTop:2}}>{cliSel.nombre} · {cliSel.telefono}</div>}
        {!cliOpen&&cliMode==='nuevo'&&nuevoC.nombre&&<div style={{fontSize:12,color:'#38bdf8',marginTop:2}}>{nuevoC.nombre}</div>}
      </button>
      {cliOpen&&<div style={{marginTop:12}}>
        <Row style={{gap:6,marginBottom:10}}>
          {[['buscar','Existente'],['nuevo','Nuevo']].map(([v,l])=>(
            <button key={v} onClick={()=>setCliMode(v)} style={{flex:1,padding:'7px',borderRadius:8,border:'none',background:cliMode===v?'#38bdf8':'#0f172a',color:cliMode===v?'#0f172a':'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
          ))}
        </Row>
        {cliMode==='buscar'?<>
          <Inp placeholder="Buscar cliente…" value={cliSearch} onChange={e=>setCliSearch(e.target.value)} style={{marginBottom:8}}/>
          <div style={{maxHeight:170,overflowY:'auto'}}>
            {cliFilt.map(c=><div key={c.id} onClick={()=>{setCliSel(c);setCliOpen(false);}} style={{padding:'9px 10px',borderRadius:8,cursor:'pointer',background:cliSel?.id===c.id?'#1e3a5f':'transparent',marginBottom:3}}>
              <div style={{fontWeight:600,fontSize:13}}>{c.nombre}</div>
              <div style={{fontSize:11,color:'#94a3b8'}}>📱 {c.telefono}</div>
            </div>)}
          </div>
        </>:<>
          <Inp placeholder="Nombre *" value={nuevoC.nombre} onChange={e=>setNuevoC(x=>({...x,nombre:e.target.value}))} style={{marginBottom:8}}/>
          <Inp placeholder="Teléfono" type="tel" value={nuevoC.telefono} onChange={e=>setNuevoC(x=>({...x,telefono:e.target.value}))}/>
        </>}
      </div>}
    </Card>
    <Card>
      <button onClick={()=>setProdOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700}}>📦 Productos {cart.length?`(${cart.reduce((s,x)=>s+x.cant,0)} artículos)`:''}</span>
          {prodOpen?<CUp/>:<CDown/>}
        </Row>
      </button>
      {prodOpen&&<div style={{marginTop:12,maxHeight:220,overflowY:'auto'}}>
        {productos.map(p=><Row key={p.id} style={{justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #0f172a'}}>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>{p.nombre}</div>
            <div style={{fontSize:11,color:'#38bdf8'}}>{fmt(p.precio)} / {p.unidad}</div>
          </div>
          <BFill onClick={()=>addCart(p)} style={{padding:'5px 12px',fontSize:12}}>+ Agregar</BFill>
        </Row>)}
      </div>}
    </Card>
    {cart.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>RESUMEN DEL PEDIDO</div>
      {cart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.nombre}</div>
          <div style={{fontSize:11,color:'#64748b'}}>{fmt(item.precio)} c/u</div>
        </div>
        <Row style={{gap:5,flexShrink:0}}>
          <button onClick={()=>updQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
          <span style={{minWidth:22,textAlign:'center',fontWeight:700,fontSize:14}}>{item.cant}</span>
          <button onClick={()=>updQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
        </Row>
        <div style={{minWidth:62,textAlign:'right',fontWeight:700,color:'#38bdf8',fontSize:13}}>{fmt(item.precio*item.cant)}</div>
      </Row>)}
      <div style={{borderTop:'1px solid #334155',paddingTop:10,marginTop:4,marginBottom:12}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700,fontSize:15}}>Total</span>
          <span style={{fontSize:22,fontWeight:800,color:'#38bdf8'}}>{fmt(total)}</span>
        </Row>
      </div>
      <Row style={{gap:8,marginBottom:12}}>
        {[['contado','💵 Contado','#166534','#4ade80'],['credito','📋 Crédito','#78350f','#fcd34d']].map(([v,l,bg,col])=>(
          <button key={v} onClick={()=>setPago(v)} style={{flex:1,padding:'9px',borderRadius:8,border:'none',background:pago===v?bg:'#0f172a',color:pago===v?col:'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
        ))}
      </Row>
      <Row style={{gap:8}}>
        <BFill onClick={guardar} bg={canSave&&!saving?'#38bdf8':'#334155'} color={canSave&&!saving?'#0f172a':'#64748b'} style={{flex:1}} disabled={!canSave||saving}>{saving?'Guardando…':'💾 Guardar pedido'}</BFill>
        {cliente?.telefono&&<BFill onClick={()=>window.open(makeWA(cliente,cart,total,pago),'_blank')} bg="#25d366" style={{padding:'8px 16px',fontSize:18}}>📲</BFill>}
      </Row>
    </Card>}
  </div>;
}

/* ── Créditos ── */
function Creditos({creditos}){
  const [abonoId,setAbonoId]=useState(null);
  const [monto,setMonto]=useState('');
  const [savingAbono,setSavingAbono]=useState(false);
  const pend=creditos.filter(c=>c.saldo>0);
  const totalPend=pend.reduce((s,c)=>s+c.saldo,0);
  const abonar=async(c)=>{
    if(savingAbono) return;
    let m=parseFloat(monto); if(!m||m<=0) return;
    m=Math.min(m,c.saldo);
    setSavingAbono(true);
    try{
      await db.collection('creditos').doc(c.id).update({
        saldo:firebase.firestore.FieldValue.increment(-m),
        abonos:firebase.firestore.FieldValue.arrayUnion({fecha:new Date().toISOString(),monto:m})
      });
      setMonto(''); setAbonoId(null);
    }catch(e){ alert('Error al registrar abono: '+e.message); }
    setSavingAbono(false);
  };
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>💳 Créditos</div>
    <Card style={{borderLeft:'3px solid #f59e0b',marginBottom:14}}>
      <div style={{fontSize:12,color:'#94a3b8'}}>Total pendiente</div>
      <div style={{fontSize:28,fontWeight:800,color:'#f59e0b'}}>{fmt(totalPend)}</div>
      <div style={{fontSize:11,color:'#64748b'}}>{pend.length} cuenta(s)</div>
    </Card>
    {pend.length===0&&<div style={{textAlign:'center',color:'#475569',fontSize:14,paddingTop:20}}>Sin créditos pendientes ✅</div>}
    {pend.map(c=><Card key={c.id}>
      <Row style={{justifyContent:'space-between',marginBottom:8}}>
        <div><div style={{fontWeight:700,fontSize:14}}>{c.clienteNombre}</div><div style={{fontSize:11,color:'#64748b'}}>{fDate(c.fecha)}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:18,fontWeight:800,color:'#f59e0b'}}>{fmt(c.saldo)}</div><div style={{fontSize:11,color:'#64748b'}}>de {fmt(c.total)}</div></div>
      </Row>
      <div style={{background:'#0f172a',borderRadius:10,height:6,marginBottom:10}}>
        <div style={{background:'#22c55e',borderRadius:10,height:6,width:`${Math.round((c.total-c.saldo)/c.total*100)}%`}}/>
      </div>
      {c.abonos.length>0&&<div style={{marginBottom:10,paddingTop:6,borderTop:'1px solid #334155'}}>
        <div style={{fontSize:11,color:'#64748b',marginBottom:4,fontWeight:700}}>ABONOS</div>
        {c.abonos.map((a,i)=><Row key={i} style={{justifyContent:'space-between',fontSize:12,marginBottom:3}}>
          <span style={{color:'#94a3b8'}}>{fDate(a.fecha)}</span>
          <span style={{color:'#22c55e',fontWeight:700}}>+{fmt(a.monto)}</span>
        </Row>)}
      </div>}
      {abonoId===c.id?<Row style={{gap:8}}>
        <Inp type="number" placeholder="Monto abono…" value={monto} onChange={e=>setMonto(e.target.value)} style={{flex:1}}/>
        <BFill onClick={()=>abonar(c)} bg="#22c55e" color="#0f172a" style={{padding:'8px 14px',opacity:savingAbono?0.6:1}} disabled={savingAbono}>{savingAbono?'…':'✓'}</BFill>
        <button onClick={()=>{setAbonoId(null);setMonto('');}} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',display:'flex'}}><XI size={18}/></button>
      </Row>:<BOut onClick={()=>setAbonoId(c.id)} color="#22c55e" style={{width:'100%'}}>+ Registrar abono</BOut>}
    </Card>)}
  </div>;
}

/* ── Ruta de reparto ── */
function RutaReparto({productos,clientes,rutas}){
  const [scanOpen,setScanOpen]=useState(false);
  const [cart,setCart]=useState([]);
  const [repartidor,setRepartidor]=useState('');
  const [msg,setMsg]=useState('');
  const [saving,setSaving]=useState(false);
  const [closing,setClosing]=useState(null);
  const [regreso,setRegreso]=useState({});
  const [scanCloseOpen,setScanCloseOpen]=useState(false);
  const flash=m=>{ setMsg(m); setTimeout(()=>setMsg(''),2500); };

  /* ── Visitas a clientes (QR en la puerta) ── */
  const abiertas=rutas.filter(r=>r.estado==='abierta');
  const [rutaActivaId,setRutaActivaId]=useState(null);
  const rutaActiva=abiertas.find(r=>r.id===rutaActivaId)||(abiertas.length===1?abiertas[0]:null);
  const [visitOpen,setVisitOpen]=useState(false);
  const [entregaCliente,setEntregaCliente]=useState(null);
  const [entregaCart,setEntregaCart]=useState([]);
  const [entregaPago,setEntregaPago]=useState('contado');
  const [entregaScanOpen,setEntregaScanOpen]=useState(false);
  const [savingEntrega,setSavingEntrega]=useState(false);

  const handleScanCliente=async code=>{
    setVisitOpen(false);
    if(!code.startsWith(QR_CLIENTE_PREFIX)){ flash('⚠️ Ese código no es un QR de cliente'); return; }
    if(!rutaActiva){ flash('⚠️ Selecciona o carga una ruta activa primero'); return; }
    const clienteId=code.slice(QR_CLIENTE_PREFIX.length);
    const cliente=clientes.find(c=>c.id===clienteId);
    if(!cliente){ flash('⚠️ Cliente no encontrado (QR inválido o cliente eliminado)'); return; }
    const ubicacionCheckin=await getUbicacion();
    db.collection('visitas').add({rutaId:rutaActiva.id,clienteId:cliente.id,clienteNombre:cliente.nombre,fecha:new Date().toISOString(),ubicacion:ubicacionCheckin}).catch(()=>{});
    setEntregaCliente({cliente,ubicacionCheckin});
    setEntregaCart([]); setEntregaPago('contado');
    flash('📍 Check-in: '+cliente.nombre);
  };
  const handleScanEntregaProducto=code=>{
    setEntregaScanOpen(false);
    const p=productos.find(x=>x.codigoBarras&&x.codigoBarras===code);
    if(!p){ flash('⚠️ Código no encontrado: '+code); return; }
    setEntregaCart(c=>{
      const ex=c.find(x=>x.id===p.id);
      return ex?c.map(x=>x.id===p.id?{...x,cant:x.cant+1}:x):[...c,{id:p.id,nombre:p.nombre,unidad:p.unidad,precio:p.precio,cant:1}];
    });
  };
  const updEntregaQty=(id,v)=>{ if(v<1){setEntregaCart(c=>c.filter(x=>x.id!==id));return;} setEntregaCart(c=>c.map(x=>x.id===id?{...x,cant:v}:x)); };
  const entregaTotal=entregaCart.reduce((s,x)=>s+x.precio*x.cant,0);
  const confirmarEntrega=async()=>{
    if(entregaCart.length===0||savingEntrega||!entregaCliente||!rutaActiva) return;
    setSavingEntrega(true);
    try{
      const ubicacionEntrega=await getUbicacion();
      const fecha=new Date().toISOString();
      const cliente=entregaCliente.cliente;
      const notaRef=db.collection('notas').doc();
      const credRef=entregaPago==='credito'?db.collection('creditos').doc():null;
      const notaData={fecha,clienteId:cliente.id,clienteNombre:cliente.nombre,clienteTelefono:cliente.telefono||'',items:entregaCart.map(x=>({...x})),total:entregaTotal,formaPago:entregaPago,tipo:'reparto',rutaId:rutaActiva.id};
      await db.runTransaction(async(t)=>{
        t.set(notaRef,notaData);
        if(credRef) t.set(credRef,{notaId:notaRef.id,clienteId:cliente.id,clienteNombre:cliente.nombre,fecha,total:entregaTotal,saldo:entregaTotal,abonos:[]});
      });
      await db.collection('rutas').doc(rutaActiva.id).update({
        entregas:firebase.firestore.FieldValue.arrayUnion({
          clienteId:cliente.id,clienteNombre:cliente.nombre,fecha,
          items:entregaCart.map(x=>({id:x.id,nombre:x.nombre,unidad:x.unidad,cant:x.cant})),
          total:entregaTotal,formaPago:entregaPago,
          ubicacionCheckin:entregaCliente.ubicacionCheckin||null,
          ubicacionEntrega:ubicacionEntrega||null
        })
      });
      setEntregaCliente(null); setEntregaCart([]);
      flash('✅ Entrega registrada: '+cliente.nombre);
    }catch(e){ alert('Error al registrar entrega: '+e.message); }
    setSavingEntrega(false);
  };

  /* ── Cargar ruta (salida) ── */
  const handleScan=code=>{
    setScanOpen(false);
    const p=productos.find(x=>x.codigoBarras&&x.codigoBarras===code);
    if(!p){ flash('⚠️ Código no encontrado: '+code); return; }
    setCart(c=>{
      const ex=c.find(x=>x.id===p.id);
      return ex?c.map(x=>x.id===p.id?{...x,cant:x.cant+1}:x):[...c,{id:p.id,nombre:p.nombre,unidad:p.unidad,cant:1}];
    });
    flash('✅ '+p.nombre+' agregado');
  };
  const updQty=(id,v)=>{ if(v<1){setCart(c=>c.filter(x=>x.id!==id));return;} setCart(c=>c.map(x=>x.id===id?{...x,cant:v}:x)); };
  const guardarRuta=async()=>{
    if(cart.length===0||saving) return;
    if(!repartidor.trim()){ flash('⚠️ Indica el repartidor'); return; }
    setSaving(true);
    try{
      await db.collection('rutas').add({fecha:new Date().toISOString(),repartidor:repartidor.trim(),estado:'abierta',salida:cart,regreso:[],entregas:[]});
      setCart([]); setRepartidor(''); flash('✅ Ruta cargada');
    }catch(e){ alert('Error al guardar ruta: '+e.message); }
    setSaving(false);
  };

  /* ── Cerrar ruta (registrar regreso) ── */
  const abrirCierre=r=>{
    setClosing(r);
    const items=r.salida||r.items||[];
    const entregadoMap={};
    (r.entregas||[]).forEach(e=>e.items.forEach(it=>{ entregadoMap[it.id]=(entregadoMap[it.id]||0)+it.cant; }));
    const init={};
    // Por defecto se asume que regresa todo lo que no se entregó a un cliente registrado (el repartidor puede ajustar)
    items.forEach(it=>{ init[it.id]=Math.max(0,it.cant-(entregadoMap[it.id]||0)); });
    setRegreso(init);
  };
  const scanRegreso=code=>{
    setScanCloseOpen(false);
    const items=closing.salida||closing.items||[];
    const item=items.find(x=>{ const p=productos.find(pp=>pp.id===x.id); return p&&p.codigoBarras===code; });
    if(!item){ flash('⚠️ Ese producto no está en la ruta cargada'); return; }
    setRegreso(r=>{
      const actual=r[item.id]||0;
      if(actual>=item.cant){ flash('⚠️ Ya se registró todo lo cargado de '+item.nombre); return r; }
      flash('✅ '+item.nombre+' registrado como regreso');
      return {...r,[item.id]:actual+1};
    });
  };
  const updRegreso=(id,v,max)=>setRegreso(r=>({...r,[id]:Math.max(0,Math.min(max,v))}));
  const cerrarRuta=async()=>{
    if(!closing||saving) return;
    setSaving(true);
    try{
      const items=closing.salida||closing.items||[];
      const regresoArr=items.map(it=>({id:it.id,nombre:it.nombre,unidad:it.unidad,cant:regreso[it.id]||0})).filter(it=>it.cant>0);
      await db.collection('rutas').doc(closing.id).update({estado:'cerrada',regreso:regresoArr,fechaCierre:new Date().toISOString()});
      setClosing(null); setRegreso({}); flash('✅ Ruta cerrada');
    }catch(e){ alert('Error al cerrar ruta: '+e.message); }
    setSaving(false);
  };
  const vendidoDe=r=>{
    const items=r.salida||r.items||[];
    const regMap={}; (r.regreso||[]).forEach(x=>regMap[x.id]=x.cant);
    return items.reduce((s,x)=>s+(x.cant-(regMap[x.id]||0)),0);
  };

  if(closing){
    const items=closing.salida||closing.items||[];
    const totalCargado=items.reduce((s,x)=>s+x.cant,0);
    const totalRegresado=Object.values(regreso).reduce((s,v)=>s+v,0);
    return <div style={{padding:'16px 12px'}}>
      <Row style={{justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:20,fontWeight:800}}>📦 Cerrar ruta</div>
        <button onClick={()=>{setClosing(null);setRegreso({});}} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',display:'flex'}}><XI/></button>
      </Row>
      <Card>
        <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{closing.repartidor||'—'}</div>
        <div style={{fontSize:11,color:'#64748b'}}>{fDate(closing.fecha)} · cargado {totalCargado} · vendido {totalCargado-totalRegresado} · regresado {totalRegresado}</div>
      </Card>
      {msg&&<div style={{background:'#14532d',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#4ade80',marginBottom:12}}>{msg}</div>}
      <Card>
        <BFill onClick={()=>setScanCloseOpen(true)} style={{width:'100%',fontSize:14,padding:12,marginBottom:10}}>📷 Escanear regreso</BFill>
        <div style={{fontSize:11,color:'#64748b',marginBottom:12,textAlign:'center'}}>Ya se restaron los productos entregados a clientes visitados. Ajusta lo que falte (pérdidas, ventas sin visita, etc.).</div>
        {items.map(it=><Row key={it.id} style={{justifyContent:'space-between',marginBottom:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600}}>{it.nombre}</div>
            <div style={{fontSize:11,color:'#64748b'}}>cargado {it.cant} · vendido {it.cant-(regreso[it.id]||0)}</div>
          </div>
          <Row style={{gap:5}}>
            <button onClick={()=>updRegreso(it.id,(regreso[it.id]||0)-1,it.cant)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
            <span style={{minWidth:22,textAlign:'center',fontWeight:700,fontSize:14}}>{regreso[it.id]||0}</span>
            <button onClick={()=>updRegreso(it.id,(regreso[it.id]||0)+1,it.cant)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
          </Row>
        </Row>)}
        <BFill onClick={cerrarRuta} bg="#22c55e" color="#0f172a" style={{width:'100%',marginTop:6,opacity:saving?0.6:1}} disabled={saving}>{saving?'Guardando…':'✅ Cerrar ruta'}</BFill>
      </Card>
      {scanCloseOpen&&<BarcodeScanner onDetected={scanRegreso} onClose={()=>setScanCloseOpen(false)}/>}
    </div>;
  }

  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>🚚 Ruta de reparto</div>
    {msg&&<div style={{background:'#14532d',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#4ade80',marginBottom:12}}>{msg}</div>}

    <Card>
      <Lbl>Repartidor</Lbl>
      <Inp value={repartidor} onChange={e=>setRepartidor(e.target.value)} placeholder="Nombre del repartidor" style={{marginBottom:10}}/>
      <BFill onClick={()=>setScanOpen(true)} style={{width:'100%',fontSize:14,padding:12}}>📷 Escanear producto</BFill>
      <div style={{fontSize:11,color:'#64748b',marginTop:8,textAlign:'center'}}>Escanea el código de barras de cada producto que se cargue en la ruta; se agregará automáticamente.</div>
    </Card>

    {cart.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>PRODUCTOS ESCANEADOS ({cart.reduce((s,x)=>s+x.cant,0)})</div>
      {cart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600}}>{item.nombre}</div>
          <div style={{fontSize:11,color:'#64748b'}}>{item.unidad}</div>
        </div>
        <Row style={{gap:5}}>
          <button onClick={()=>updQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
          <span style={{minWidth:22,textAlign:'center',fontWeight:700,fontSize:14}}>{item.cant}</span>
          <button onClick={()=>updQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
        </Row>
      </Row>)}
      <BFill onClick={guardarRuta} style={{width:'100%',marginTop:6,opacity:saving?0.6:1}} disabled={saving}>{saving?'Guardando…':'💾 Cargar ruta'}</BFill>
    </Card>}

    <Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:8}}>VISITAR CLIENTE (QR EN LA PUERTA)</div>
      {abiertas.length===0&&<div style={{fontSize:12,color:'#64748b',marginBottom:8}}>Carga una ruta arriba para poder registrar visitas.</div>}
      {abiertas.length>1&&<select value={rutaActivaId||''} onChange={e=>setRutaActivaId(e.target.value)} style={{width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:8,padding:'8px 10px',color:'#f1f5f9',fontSize:13,marginBottom:10}}>
        <option value="">Selecciona la ruta activa…</option>
        {abiertas.map(r=><option key={r.id} value={r.id}>{r.repartidor} · {fDate(r.fecha)}</option>)}
      </select>}
      <BFill onClick={()=>setVisitOpen(true)} bg="#a855f7" style={{width:'100%',fontSize:14,padding:12,opacity:rutaActiva?1:0.5}} disabled={!rutaActiva}>📍 Escanear QR de cliente</BFill>
      <div style={{fontSize:11,color:'#64748b',marginTop:8,textAlign:'center'}}>Registra la llegada (con ubicación GPS) y abre la entrega para ese cliente.</div>
    </Card>

    {rutas.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>RUTAS</div>
      {rutas.map(r=>{
        const items=r.salida||r.items||[];
        const totalCargado=items.reduce((s,x)=>s+x.cant,0);
        const cerrada=r.estado==='cerrada';
        const vendido=cerrada?vendidoDe(r):null;
        return <div key={r.id} style={{paddingBottom:10,borderBottom:'1px solid #0f172a',marginBottom:10}}>
          <Row style={{justifyContent:'space-between',marginBottom:4}}>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>{r.repartidor||'—'}</div>
              <div style={{fontSize:11,color:'#94a3b8'}}>{fDate(r.fecha)}</div>
            </div>
            <Tag color={cerrada?'#64748b':'#facc15'}>{cerrada?'Cerrada':'Abierta'}</Tag>
          </Row>
          <div style={{fontSize:12,color:'#cbd5e1',marginBottom:6}}>Cargado: {totalCargado}{cerrada?` · Vendido: ${vendido} · Regresado: ${totalCargado-vendido}`:''}</div>
          {items.map(it=><div key={it.id} style={{fontSize:12,color:'#cbd5e1'}}>• {it.nombre} x{it.cant}</div>)}
          {r.entregas&&r.entregas.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid #0f172a'}}>
            <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:6}}>VISITAS A CLIENTES ({r.entregas.length})</div>
            {r.entregas.map((e,i)=>{ const u=e.ubicacionEntrega||e.ubicacionCheckin; const link=mapsLink(u); return <Row key={i} style={{justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontSize:12}}>
                <span style={{fontWeight:600}}>{e.clienteNombre}</span>
                <span style={{color:'#64748b'}}> · {fmt(e.total)} · {e.formaPago}</span>
              </div>
              {link&&<a href={link} target="_blank" rel="noreferrer" style={{fontSize:11,color:'#38bdf8'}}>📍 mapa</a>}
            </Row>;})}
          </div>}
          {!cerrada&&<BOut onClick={()=>abrirCierre(r)} color="#facc15" style={{marginTop:8,width:'100%'}}>📦 Cerrar ruta</BOut>}
        </div>;
      })}
    </Card>}

    {scanOpen&&<BarcodeScanner onDetected={handleScan} onClose={()=>setScanOpen(false)}/>}
    {visitOpen&&<BarcodeScanner onDetected={handleScanCliente} onClose={()=>setVisitOpen(false)}/>}

    {entregaCliente&&<Modal title={`📦 Entrega — ${entregaCliente.cliente.nombre}`} onClose={()=>{setEntregaCliente(null);setEntregaCart([]);}}>
      <div style={{fontSize:11,color:'#64748b',marginBottom:10}}>{entregaCliente.ubicacionCheckin?`📍 Ubicación registrada (±${Math.round(entregaCliente.ubicacionCheckin.accuracy||0)}m)`:'⚠️ No se pudo obtener ubicación GPS'}</div>
      <BFill onClick={()=>setEntregaScanOpen(true)} style={{width:'100%',fontSize:14,padding:12,marginBottom:10}}>📷 Escanear producto</BFill>
      {entregaCart.length>0&&<>
        {entregaCart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600}}>{item.nombre}</div>
            <div style={{fontSize:11,color:'#64748b'}}>{fmt(item.precio)} c/u</div>
          </div>
          <Row style={{gap:5}}>
            <button onClick={()=>updEntregaQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
            <span style={{minWidth:22,textAlign:'center',fontWeight:700,fontSize:14}}>{item.cant}</span>
            <button onClick={()=>updEntregaQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
          </Row>
        </Row>)}
        <div style={{borderTop:'1px solid #334155',paddingTop:10,marginTop:4,marginBottom:12}}>
          <Row style={{justifyContent:'space-between'}}>
            <span style={{fontWeight:700,fontSize:15}}>Total</span>
            <span style={{fontSize:22,fontWeight:800,color:'#38bdf8'}}>{fmt(entregaTotal)}</span>
          </Row>
        </div>
        <Row style={{gap:8,marginBottom:12}}>
          {[['contado','💵 Contado','#166534','#4ade80'],['credito','📋 Crédito','#78350f','#fcd34d']].map(([v,l,bg,col])=>(
            <button key={v} onClick={()=>setEntregaPago(v)} style={{flex:1,padding:'9px',borderRadius:8,border:'none',background:entregaPago===v?bg:'#0f172a',color:entregaPago===v?col:'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
          ))}
        </Row>
        <BFill onClick={confirmarEntrega} style={{width:'100%'}} disabled={savingEntrega}>{savingEntrega?'Guardando…':'✅ Confirmar entrega'}</BFill>
      </>}
      {entregaScanOpen&&<BarcodeScanner onDetected={handleScanEntregaProducto} onClose={()=>setEntregaScanOpen(false)}/>}
    </Modal>}
  </div>;
}

/* ── Configuración ── */
function Configuracion({currentUser,onBack,onLogout}){
  const [sub,setSub]=useState('perfil');
  const [users,setUsersList]=useState([]);
  const [form,setForm]=useState(null);
  const [pw,setPw]=useState({old:'',new_:'',conf:''});
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');
  const isAdmin=currentUser.role==='admin';
  const flash=(m,isErr=false)=>{ isErr?setErr(m):setMsg(m); setTimeout(()=>{setErr('');setMsg('');},4000); };

  useEffect(()=>{
    if(!isAdmin) return;
    const unsub=db.collection('usuarios').onSnapshot(snap=>{
      setUsersList(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return unsub;
  },[isAdmin]);

  const changePw=async()=>{
    if(pw.new_.length<6){flash('Mínimo 6 caracteres',true);return;}
    if(pw.new_!==pw.conf){flash('Las contraseñas no coinciden',true);return;}
    try{
      const cred=firebase.auth.EmailAuthProvider.credential(currentUser.email,pw.old);
      await auth.currentUser.reauthenticateWithCredential(cred);
      await auth.currentUser.updatePassword(pw.new_);
      setPw({old:'',new_:'',conf:''}); flash('✅ Contraseña actualizada');
    }catch(e){ flash('Contraseña actual incorrecta',true); }
  };

  const saveUser=async()=>{
    if(!form.nombre||!form.email||(!form.id&&!form.password)){flash('Completa todos los campos',true);return;}
    try{
      if(form.id){
        await db.collection('usuarios').doc(form.id).update({nombre:form.nombre,role:form.role});
        flash('✅ Usuario actualizado');
      }else{
        if(form.password.length<6){flash('La contraseña debe tener mínimo 6 caracteres',true);return;}
        const secondary=firebase.apps.find(a=>a.name==='Secondary')||firebase.initializeApp(firebaseConfig,'Secondary');
        const secAuth=secondary.auth();
        const cred=await secAuth.createUserWithEmailAndPassword(form.email.trim(),form.password);
        await db.collection('usuarios').doc(cred.user.uid).set({nombre:form.nombre,email:form.email.trim(),role:form.role});
        await secAuth.signOut();
        flash('✅ Usuario creado');
      }
      setForm(null);
    }catch(e){ flash('Error: '+e.message,true); }
  };

  const delUser=async(u)=>{
    if(u.id===currentUser.uid){flash('No puedes eliminarte',true);return;}
    await db.collection('usuarios').doc(u.id).delete();
    flash('Perfil eliminado. Borra también la cuenta en Firebase Console → Authentication.');
  };

  return <div style={{padding:'16px 12px'}}>
    <Row style={{marginBottom:16}}>
      <button onClick={onBack} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:22,padding:'0 4px 0 0',lineHeight:1}}>←</button>
      <div style={{fontSize:20,fontWeight:800}}>⚙️ Configuración</div>
    </Row>
    {msg&&<div style={{background:'#14532d',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#4ade80',marginBottom:12}}>{msg}</div>}
    {err&&<div style={{background:'#450a0a',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#fca5a5',marginBottom:12}}>{err}</div>}
    <Row style={{gap:6,marginBottom:16}}>
      {[['perfil','👤 Perfil'],['password','🔑 Contraseña'],...(isAdmin?[['usuarios','👥 Usuarios']]:[])].map(([v,l])=>(
        <button key={v} onClick={()=>{setSub(v);setErr('');setMsg('');}} style={{flex:1,padding:'8px 2px',borderRadius:8,border:'none',background:sub===v?'#38bdf8':'#1e293b',color:sub===v?'#0f172a':'#94a3b8',fontSize:11,fontWeight:700,cursor:'pointer'}}>{l}</button>
      ))}
    </Row>
    {sub==='perfil'&&<>
      <Card>
        <div style={{textAlign:'center',padding:'12px 0 16px'}}>
          <div style={{fontSize:52,marginBottom:8}}>👤</div>
          <div style={{fontSize:18,fontWeight:700}}>{currentUser.nombre}</div>
          <div style={{fontSize:13,color:'#94a3b8',marginTop:2}}>✉️ {currentUser.email}</div>
          <Tag color={currentUser.role==='admin'?'#a78bfa':'#38bdf8'} style={{marginTop:8,display:'inline-block'}}>{currentUser.role}</Tag>
        </div>
      </Card>
      <BOut onClick={onLogout} color="#ef4444" style={{width:'100%',marginTop:8}}>🚪 Cerrar sesión</BOut>
    </>}
    {sub==='password'&&<Card>
      <Lbl>Contraseña actual</Lbl><PwInp value={pw.old} onChange={e=>setPw(f=>({...f,old:e.target.value}))}/>
      <Lbl>Nueva contraseña</Lbl><PwInp value={pw.new_} onChange={e=>setPw(f=>({...f,new_:e.target.value}))}/>
      <Lbl>Confirmar</Lbl><PwInp value={pw.conf} onChange={e=>setPw(f=>({...f,conf:e.target.value}))}/>
      <BFill onClick={changePw} style={{width:'100%',marginTop:6}}>🔑 Actualizar contraseña</BFill>
    </Card>}
    {sub==='usuarios'&&isAdmin&&<>
      <Row style={{justifyContent:'flex-end',marginBottom:10}}>
        <BFill onClick={()=>setForm({nombre:'',email:'',password:'',role:'usuario'})}>+ Nuevo usuario</BFill>
      </Row>
      {users.map(u=><Card key={u.id}>
        <Row style={{justifyContent:'space-between'}}>
          <div>
            <Row style={{gap:6,flexWrap:'wrap'}}>
              <span style={{fontWeight:700,fontSize:14}}>{u.nombre}</span>
              <Tag color={u.role==='admin'?'#a78bfa':'#38bdf8'}>{u.role}</Tag>
              {u.id===currentUser.uid&&<Tag color="#22c55e">Tú</Tag>}
            </Row>
            <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>✉️ {u.email}</div>
          </div>
          <Row style={{gap:4}}>
            <button onClick={()=>setForm({id:u.id,nombre:u.nombre,email:u.email,role:u.role})} style={{background:'#172554',border:'none',color:'#60a5fa',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>✏️</button>
            {u.id!==currentUser.uid&&<button onClick={()=>delUser(u)} style={{background:'#450a0a',border:'none',color:'#f87171',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>🗑</button>}
          </Row>
        </Row>
      </Card>)}
    </>}
    {form&&<Modal title={form.id?'Editar Usuario':'Nuevo Usuario'} onClose={()=>{setForm(null);setErr('');}}>
      <Lbl>Nombre completo</Lbl><Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Lbl>Correo electrónico</Lbl><Inp type="email" value={form.email} disabled={!!form.id} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="correo@ejemplo.com" style={{marginBottom:10,opacity:form.id?0.6:1}}/>
      {!form.id&&<><Lbl>Contraseña</Lbl><PwInp value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></>}
      <Lbl>Rol</Lbl>
      <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={{background:'#0f172a',border:'1px solid #334155',borderRadius:8,padding:'8px 10px',color:'#f1f5f9',fontSize:13,width:'100%',marginBottom:16}}>
        <option value="usuario">usuario</option><option value="admin">admin</option>
      </select>
      {form.id&&<div style={{fontSize:11,color:'#64748b',marginBottom:12}}>El correo y la contraseña solo los puede cambiar el propio usuario desde su pestaña de Contraseña.</div>}
      <BFill onClick={saveUser} style={{width:'100%'}}>💾 Guardar</BFill>
    </Modal>}
  </div>;
}

/* ── App Root ── */
function App(){
  const [tab,setTab]=useState('home');
  const [prevTab,setPrevTab]=useState('home');
  const [currentUser,setCurrentUser]=useState(null);
  const [productos,setProductos]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [notas,setNotas]=useState([]);
  const [creditos,setCreditos]=useState([]);
  const [rutas,setRutas]=useState([]);
  const [authChecked,setAuthChecked]=useState(false);
  const [firestoreError,setFirestoreError]=useState(null);

  // Autenticación: escucha sesión de Firebase y carga el perfil (usuarios/{uid})
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const ref=db.collection('usuarios').doc(fbUser.uid);
          const snap=await ref.get();
          let perfil;
          if(snap.exists){
            perfil=snap.data();
          }else{
            // Primer inicio de sesión sin perfil: se crea como admin (útil para la primera cuenta)
            perfil={nombre:fbUser.email.split('@')[0],email:fbUser.email,role:'admin'};
            await ref.set(perfil);
          }
          setCurrentUser({uid:fbUser.uid,...perfil});
        }catch(e){ setCurrentUser({uid:fbUser.uid,nombre:fbUser.email,email:fbUser.email,role:'usuario'}); }
      }else{
        setCurrentUser(null);
      }
      setAuthChecked(true);
    });
    return unsub;
  },[]);

  // Suscripciones en tiempo real a Firestore (solo cuando hay sesión iniciada)
  useEffect(()=>{
    if(!currentUser) return;
    (async()=>{
      try{
        const seedRef=db.collection('_meta').doc('seed');
        const seedSnap=await seedRef.get();
        const seeded=seedSnap.exists?seedSnap.data():{};
        if(!seeded.productos){
          const batch=db.batch();
          S_PROD.forEach(p=>{ const {id,...rest}=p; batch.set(db.collection('productos').doc(),rest); });
          batch.set(seedRef,{productos:true},{merge:true});
          await batch.commit();
        }
        if(!seeded.clientes){
          const batch=db.batch();
          S_CLI.forEach(c=>{ const {id,...rest}=c; batch.set(db.collection('clientes').doc(),rest); });
          batch.set(seedRef,{clientes:true},{merge:true});
          await batch.commit();
        }
      }catch(e){ console.error('Error al sembrar datos iniciales',e); }
    })();
    const errorHandler=(err)=>{ console.error('Firestore error:',err); setFirestoreError('⚠️ Error de conexión con la base de datos. Revisa tus permisos.'); };
    const unsubs=[
      db.collection('productos').onSnapshot(snap=>{
        setProductos(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('clientes').onSnapshot(snap=>{
        setClientes(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('notas').orderBy('fecha','desc').limit(500).onSnapshot(snap=>{
        setNotas(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('creditos').onSnapshot(snap=>{
        setCreditos(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('rutas').orderBy('fecha','desc').limit(100).onSnapshot(snap=>{
        setRutas(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
    ];
    return ()=>unsubs.forEach(u=>u());
  },[currentUser]);

  const goConfig=()=>{ if(tab!=='config') setPrevTab(tab); setTab('config'); };
  const logout=()=>{ auth.signOut(); setTab('home'); };
  const ctx={productos,clientes,notas,creditos,rutas};
  const TABS=[['home','🏠','Inicio'],['productos','📦','Productos'],['nota','🧾','Pedido'],['clientes','👥','Clientes'],['creditos','💳','Créditos'],['ruta','🚚','Ruta']];

  if(!authChecked) return <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:'100vh',color:'#94a3b8',fontSize:14}}>Cargando…</div>;
  if(!currentUser) return <Login/>;

  return <div style={{minHeight:'100vh',position:'relative',paddingTop:50,paddingBottom:tab==='config'?24:72}}>
    <div style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:420,background:'#0f172a',borderBottom:'1px solid #1e293b',zIndex:100,height:50,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',boxSizing:'border-box'}}>
      <div style={{fontSize:15,fontWeight:800,color:'#38bdf8'}}>🚚 Productos de la Costa</div>
      <Row style={{gap:6}}>
        <span style={{fontSize:12,color:'#475569'}}>Hola, {currentUser.nombre.split(' ')[0]}</span>
        <button onClick={goConfig} style={{background:tab==='config'?'#1e293b':'none',border:'none',color:tab==='config'?'#38bdf8':'#64748b',cursor:'pointer',borderRadius:8,padding:'5px 7px',display:'flex',alignItems:'center'}}>
          <Gear/>
        </button>
      </Row>
    </div>
    {firestoreError&&<div style={{margin:'0 12px 10px',background:'#450a0a',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#fca5a5'}}>{firestoreError}</div>}
    {tab==='home'&&<Dashboard {...ctx}/>}
    {tab==='productos'&&<Productos {...ctx} currentUser={currentUser}/>}
    {tab==='nota'&&<CrearNota {...ctx}/>}
    {tab==='clientes'&&<Clientes {...ctx}/>}
    {tab==='creditos'&&<Creditos {...ctx}/>}
    {tab==='ruta'&&<RutaReparto {...ctx}/>}
    {tab==='config'&&<Configuracion currentUser={currentUser} onBack={()=>setTab(prevTab)} onLogout={logout}/>}
    {tab!=='config'&&<nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:420,background:'#1e293b',borderTop:'1px solid #334155',display:'flex',zIndex:200}}>
      {TABS.map(([id,ico,lbl])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'10px 2px 7px',background:'none',border:'none',color:tab===id?'#38bdf8':'#64748b',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,fontSize:10,fontWeight:tab===id?700:400}}>
          <span style={{fontSize:22,lineHeight:1}}>{ico}</span>{lbl}
        </button>
      ))}
    </nav>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
