function Modal({title,onClose,children}){
  return <div style={{position:'fixed',inset:0,background:'#000c',zIndex:300,display:'flex',alignItems:'flex-end'}}>
    <div style={{background:'#1e293b',width:'100%',maxWidth:420,margin:'0 auto',borderRadius:'18px 18px 0 0',padding:20,maxHeight:'90vh',overflowY:'auto'}}>

      </Row>
      {children}

  </div>;
}

function PwInp({value,onChange,placeholder}){
  const [show,setShow]=useState(false);
  return <div style={{position:'relative',marginBottom:10}}>
    <Inp type={show?'text':'password'} value={value} onChange={onChange} placeholder={placeholder||'••••••'} style={{paddingRight:38}}/>
    <button onClick={()=>setShow(v=>!v)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#64748b',cursor:'pointer',padding:0,display:'flex'}}>
      {show?<EyeX/>:<EyeI/>}
    </button>
  </div>;
}

/* ── Escáner de código de barras (cámara) ── */
function BarcodeScanner({onDetected,onClose}){
  const [elId]=useState(()=>'scanner-'+uid());
  const [err,setErr]=useState('');
  useEffect(()=>{
    let scanner=null, stopped=false, cancelled=false;
    (async()=>{
      try{
        scanner=new Html5Qrcode(elId);
        await scanner.start(
          {facingMode:'environment'},
          {fps:10,qrbox:{width:260,height:130}},
          (decodedText)=>{
            if(stopped||cancelled) return;
            stopped=true;
            scanner.stop().then(()=>scanner.clear()).catch(()=>{});
            onDetected(decodedText);
          },
          ()=>{}
        );
      }catch(e){ if(!cancelled) setErr('No se pudo acceder a la cámara. Revisa los permisos del navegador.'); }
    })();
    return ()=>{ cancelled=true; if(scanner){ scanner.stop().then(()=>scanner.clear()).catch(()=>{}); } };
  },[]);
  return <Modal title="📷 Escanear código de barras" onClose={onClose}>
    {err
      ?<div style={{fontSize:13,color:'#f87171',textAlign:'center',padding:'24px 0'}}>{err}</div>
      :<div id={elId} style={{width:'100%',borderRadius:10,overflow:'hidden',background:'#000'}}/>}
    <div style={{fontSize:11,color:'#64748b',textAlign:'center',marginTop:10}}>Apunta la cámara al código de barras del producto</div>
  </Modal>;
}

/* ── Dashboard ── */
function Dashboard({notas,productos,creditos}){
  const hoy=new Date().toDateString();
  const vhoy=notas.filter(n=>new Date(n.fecha).toDateString()===hoy);
  const thoy=vhoy.reduce((s,n)=>s+n.total,0);
  const pend=creditos.filter(c=>c.saldo>0);
  const tcred=pend.reduce((s,c)=>s+c.saldo,0);
  const bajo=productos.filter(p=>p.stock<10);
  const bmap=notas.reduce((m,n)=>{ m[n.clienteId]=m[n.clienteId]||{nombre:n.clienteNombre,total:0,count:0}; m[n.clienteId].total+=n.total; m[n.clienteId].count+=1; return m; },{});
  const top=Object.values(bmap).sort((a,b)=>b.total-a.total).slice(0,5);
  const maxT=top[0]?.total||1;
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:14}}>📊 Dashboard</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <Card style={{gridColumn:'1/-1'}}>
        <div style={{fontSize:12,color:'#94a3b8'}}>Ventas hoy</div>
        <div style={{fontSize:30,fontWeight:800,color:'#38bdf8'}}>{fmt(thoy)}</div>
        <div style={{fontSize:11,color:'#64748b'}}>{vhoy.length} pedido(s)</div>
      </Card>
      <Card>
        <div style={{fontSize:11,color:'#94a3b8'}}>Créditos</div>
        <div style={{fontSize:20,fontWeight:700,color:'#f59e0b'}}>{fmt(tcred)}</div>
        <div style={{fontSize:11,color:'#64748b'}}>{pend.length} cliente(s)</div>
      </Card>
      <Card>
        <div style={{fontSize:11,color:'#94a3b8'}}>Stock bajo</div>
        <div style={{fontSize:20,fontWeight:700,color:'#ef4444'}}>{bajo.length}</div>
        <div style={{fontSize:11,color:'#64748b'}}>producto(s)</div>
      </Card>
    </div>
    {top.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>🏆 CLIENTES QUE MÁS COMPRAN</div>
      {top.map((b,i)=><div key={i} style={{marginBottom:10}}>
        <Row style={{justifyContent:'space-between',marginBottom:3}}>
          <span style={{fontSize:13,fontWeight:600}}>{b.nombre}</span>
          <Row style={{gap:6}}><Tag color="#64748b">{b.count} ped.</Tag><span style={{fontSize:13,fontWeight:700,color:'#38bdf8'}}>{fmt(b.total)}</span></Row>
        </Row>
        <div style={{background:'#0f172a',borderRadius:10,height:5}}>
          <div style={{background:'linear-gradient(90deg,#38bdf8,#818cf8)',borderRadius:10,height:5,width:`${(b.total/maxT*100).toFixed(0)}%`}}/>
        </div>
      </div>)}
    </Card>}
    {bajo.length>0&&<Card style={{borderLeft:'3px solid #ef4444'}}>
      <div style={{fontSize:12,color:'#ef4444',fontWeight:700,marginBottom:6}}>⚠️ Stock bajo</div>
      {bajo.map(p=><Row key={p.id} style={{justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:13}}>{p.nombre}</span><Tag color="#ef4444">{p.stock} {p.unidad}</Tag></Row>)}
    </Card>}

      {vhoy.map(n=><Row key={n.id} style={{justifyContent:'space-between',paddingBottom:8,borderBottom:'1px solid #0f172a',marginBottom:4}}>

/* ── Productos ── */
function Productos({productos,setProductos}){
  const [sel,setSel]=useState([]);
  const [q,setQ]=useState('');
  const [form,setForm]=useState(null);
  const [scanOpen,setScanOpen]=useState(false);
  const list=productos.filter(p=>p.nombre.toLowerCase().includes(q.toLowerCase()));
  const allSel=list.length>0&&sel.length===list.length;
  const togSel=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const togAll=()=>setSel(allSel?[]:list.map(p=>p.id));
  const delSel=()=>{ setProductos(p=>p.filter(x=>!sel.includes(x.id))); setSel([]); };
  const save=()=>{
    if(!form.nombre||!form.precio) return;
    const item={...form,precio:+form.precio,stock:+form.stock};
    if(item.id) setProductos(p=>p.map(x=>x.id===item.id?item:x));
    else setProductos(p=>[...p,{...item,id:uid()}]);
    setForm(null);
  };
  return <div style={{padding:'16px 12px'}}>
    <Row style={{justifyContent:'space-between',marginBottom:12}}>
      <div style={{fontSize:20,fontWeight:800}}>📦 Productos</div>
      <BFill onClick={()=>setForm({nombre:'',precio:'',stock:'',unidad:'',codigoBarras:''})}>+ Nuevo</BFill>
    </Row>
    <Inp placeholder="🔍 Buscar..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
    {sel.length>0&&<Row style={{marginBottom:10,background:'#450a0a',borderRadius:8,padding:'8px 12px'}}>
      <span style={{flex:1,fontSize:13,color:'#fca5a5'}}>{sel.length} seleccionado(s)</span>
      <BOut onClick={delSel} color="#ef4444">🗑 Eliminar</BOut>
    </Row>}
    <Row style={{paddingLeft:4,marginBottom:6}}>
      <button onClick={togAll} style={{background:'none',border:'none',color:allSel?'#38bdf8':'#94a3b8',cursor:'pointer',padding:0,display:'flex'}}>
        {allSel?<ChkSq/>:<SqI/>}
      </button>
      <span style={{fontSize:11,color:'#64748b'}}>Seleccionar todos</span>
    </Row>
    {list.map(p=><Card key={p.id} style={{display:'flex',alignItems:'flex-start',gap:10}}>
      <button onClick={()=>togSel(p.id)} style={{background:'none',border:'none',color:sel.includes(p.id)?'#38bdf8':'#475569',cursor:'pointer',padding:0,marginTop:2,flexShrink:0,display:'flex'}}>
        {sel.includes(p.id)?<ChkSq/>:<SqI/>}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700,fontSize:14}}>{p.nombre}</span>
          <span style={{fontWeight:800,color:'#38bdf8',fontSize:14}}>{fmt(p.precio)}</span>
        </Row>
        <Row style={{marginTop:4}}><Tag color={p.stock<10?'#ef4444':'#22c55e'}>{p.stock} {p.unidad}</Tag></Row>
        {p.codigoBarras&&<div style={{fontSize:10,color:'#475569',marginTop:3}}>🏷️ {p.codigoBarras}</div>}
      </div>
      <Row style={{gap:4,flexShrink:0}}>
        <button onClick={()=>setForm({...p,precio:String(p.precio),stock:String(p.stock),codigoBarras:p.codigoBarras||''})} style={{background:'#172554',border:'none',color:'#60a5fa',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>✏️</button>
        <button onClick={()=>setProductos(pr=>pr.filter(x=>x.id!==p.id))} style={{background:'#450a0a',border:'none',color:'#f87171',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>🗑</button>
      </Row>
    </Card>)}
    {form&&<Modal title={form.id?'Editar Producto':'Nuevo Producto'} onClose={()=>setForm(null)}>
      <Lbl>Nombre</Lbl>
      <Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Row style={{gap:10,marginBottom:10}}>
        <div style={{flex:1}}><Lbl>Precio ($)</Lbl><Inp type="number" value={form.precio} onChange={e=>setForm(f=>({...f,precio:e.target.value}))}/></div>
        <div style={{flex:1}}><Lbl>Stock</Lbl><Inp type="number" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/></div>
      </Row>
      <Lbl>Unidad</Lbl>
      <Inp value={form.unidad} onChange={e=>setForm(f=>({...f,unidad:e.target.value}))} placeholder="garrafón, bolsa…" style={{marginBottom:10}}/>
      <Lbl>Código de barras</Lbl>
      <Row style={{gap:8,marginBottom:16}}>
        <Inp value={form.codigoBarras||''} onChange={e=>setForm(f=>({...f,codigoBarras:e.target.value}))} placeholder="Escanea o escribe el código" style={{flex:1}}/>
        <BOut onClick={()=>setScanOpen(true)} style={{flexShrink:0,padding:'8px 12px'}}>📷</BOut>
      </Row>
      <BFill onClick={save} style={{width:'100%'}}>💾 Guardar</BFill>
    </Modal>}
    {scanOpen&&<BarcodeScanner onDetected={code=>{setForm(f=>({...f,codigoBarras:code}));setScanOpen(false);}} onClose={()=>setScanOpen(false)}/>}
  </div>;
}

/* ── Clientes ── */
function Clientes({clientes,setClientes,notas,creditos}){
  const [filtro,setFiltro]=useState('activos');
  const [q,setQ]=useState('');
  const [form,setForm]=useState(null);
  const [histId,setHistId]=useState(null);
  const cmap=creditos.reduce((m,c)=>{ if(c.saldo>0)m[c.clienteId]=(m[c.clienteId]||0)+c.saldo; return m; },{});
  const list=clientes
    .filter(c=>filtro==='activos'?c.activo:filtro==='inactivos'?!c.activo:c.activo&&!!cmap[c.id])
    .filter(c=>c.nombre.toLowerCase().includes(q.toLowerCase()));
  const save=()=>{
    if(!form.nombre) return;
    if(form.id) setClientes(cs=>cs.map(c=>c.id===form.id?{...form}:c));
    else setClientes(cs=>[...cs,{...form,id:uid(),activo:true}]);
    setForm(null);
  };
  return <div style={{padding:'16px 12px'}}>
    <Row style={{justifyContent:'space-between',marginBottom:12}}>

/* ── Crear Nota ── */
function CrearNota({productos,clientes,setClientes,notas,setNotas,creditos,setCreditos}){
  const [cliOpen,setCliOpen]=useState(true);
  const [prodOpen,setProdOpen]=useState(false);
  const [cliMode,setCliMode]=useState('buscar');
  const [cliSearch,setCliSearch]=useState('');
  const [cliSel,setCliSel]=useState(null);
  const [nuevoC,setNuevoC]=useState({nombre:'',telefono:''});
  const [cart,setCart]=useState([]);
  const [pago,setPago]=useState('contado');
  const [done,setDone]=useState(null);
  const cliFilt=clientes.filter(c=>c.activo&&c.nombre.toLowerCase().includes(cliSearch.toLowerCase()));
  const addCart=p=>setCart(c=>{ const ex=c.find(x=>x.id===p.id); return ex?c.map(x=>x.id===p.id?{...x,cant:x.cant+1}:x):[...c,{id:p.id,nombre:p.nombre,precio:p.precio,cant:1}]; });
  const updQty=(id,v)=>{ if(v<1){setCart(c=>c.filter(x=>x.id!==id));return;} setCart(c=>c.map(x=>x.id===id?{...x,cant:v}:x)); };
  const total=cart.reduce((s,x)=>s+x.precio*x.cant,0);
  const cliente=cliMode==='nuevo'?nuevoC:cliSel;
  const canSave=cliente?.nombre&&cart.length>0;
  const makeWA=(cl,items,tot,fp)=>{
    const lines=items.map(x=>`• ${x.nombre} x${x.cant} = ${fmt(x.precio*x.cant)}`).join('\n');
    const text=`🧾 *PEDIDO*\n👤 ${cl.nombre}\n\n${lines}\n\n💰 *Total: ${fmt(tot)}*\nPago: ${fp}`;
    return `https://wa.me/52${(cl.telefono||'').replace(/\D/g,'')}?text=${encodeURIComponent(text)}`;
  };
  const guardar=()=>{
    if(!canSave) return;
    let cl=cliMode==='nuevo'?(()=>{ const nc={...nuevoC,id:uid(),domicilio:'',activo:true}; setClientes(cs=>[...cs,nc]); return nc; })():cliSel;
    const nota={id:uid(),fecha:new Date().toISOString(),clienteId:cl.id,clienteNombre:cl.nombre,clienteTelefono:cl.telefono,items:cart.map(x=>({...x})),total,formaPago:pago};
    setNotas(n=>[nota,...n]);
    if(pago==='credito') setCreditos(cs=>[...cs,{id:uid(),notaId:nota.id,clienteId:cl.id,clienteNombre:cl.nombre,fecha:nota.fecha,total,saldo:total,abonos:[]}]);
    setDone({nota,cl}); setCart([]); setCliSel(null); setNuevoC({nombre:'',telefono:''}); setCliMode('buscar');
  };
  if(done) return <div style={{padding:24,textAlign:'center'}}>
    <div style={{fontSize:52,marginBottom:8}}>✅</div>
    <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Pedido guardado</div>
    <div style={{color:'#94a3b8',marginBottom:24}}>{done.cl.nombre} · {fmt(done.nota.total)}</div>
    {done.cl.telefono&&<BFill onClick={()=>window.open(makeWA(done.cl,done.nota.items,done.nota.total,done.nota.formaPago),'_blank')} bg="#25d366" style={{width:'100%',marginBottom:12,fontSize:15}}>📲 Enviar ticket por WhatsApp</BFill>}
    <BOut onClick={()=>setDone(null)} color="#38bdf8" style={{width:'100%'}}>+ Nuevo pedido</BOut>
  </div>;
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>🧾 Crear Pedido</div>
    <Card>
      <button onClick={()=>setCliOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700}}>👤 Cliente {((cliMode==='nuevo'&&nuevoC.nombre)||cliSel)?'✅':''}</span>
          {cliOpen?<CUp/>:<CDown/>}
        </Row>
        {!cliOpen&&cliSel&&<div style={{fontSize:12,color:'#38bdf8',marginTop:2}}>{cliSel.nombre} · {cliSel.telefono}</div>}
        {!cliOpen&&cliMode==='nuevo'&&nuevoC.nombre&&<div style={{fontSize:12,color:'#38bdf8',marginTop:2}}>{nuevoC.nombre}</div>}
      </button>
      {cliOpen&&<div style={{marginTop:12}}>
        <Row style={{gap:6,marginBottom:10}}>
          {[['buscar','Existente'],['nuevo','Nuevo']].map(([v,l])=>(
            <button key={v} onClick={()=>setCliMode(v)} style={{flex:1,padding:'7px',borderRadius:8,border:'none',background:cliMode===v?'#38bdf8':'#0f172a',color:cliMode===v?'#0f172a':'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
          ))}
        </Row>
        {cliMode==='buscar'?<>
          <Inp placeholder="Buscar cliente…" value={cliSearch} onChange={e=>setCliSearch(e.target.value)} style={{marginBottom:8}}/>
          <div style={{maxHeight:170,overflowY:'auto'}}>
            {cliFilt.map(c=><div key={c.id} onClick={()=>{setCliSel(c);setCliOpen(false);}} style={{padding:'9px 10px',borderRadius:8,cursor:'pointer',background:cliSel?.id===c.id?'#1e3a5f':'transparent',marginBottom:3}}>
              <div style={{fontWeight:600,fontSize:13}}>{c.nombre}</div>
              <div style={{fontSize:11,color:'#94a3b8'}}>📱 {c.telefono}</div>
            </div>)}
          </div>
        </>:<>
          <Inp placeholder="Nombre *" value={nuevoC.nombre} onChange={e=>setNuevoC(x=>({...x,nombre:e.target.value}))} style={{marginBottom:8}}/>
          <Inp placeholder="Teléfono" type="tel" value={nuevoC.telefono} onChange={e=>setNuevoC(x=>({...x,telefono:e.target.value}))}/>
        </>}
      </div>}
    </Card>
    <Card>
      <button onClick={()=>setProdOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700}}>📦 Productos {cart.length?`(${cart.reduce((s,x)=>s+x.cant,0)} artículos)`:''}</span>
          {prodOpen?<CUp/>:<CDown/>}
        </Row>
      </button>
      {prodOpen&&<div style={{marginTop:12,maxHeight:220,overflowY:'auto'}}>
        {productos.map(p=><Row key={p.id} style={{justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #0f172a'}}>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>{p.nombre}</div>
            <div style={{fontSize:11,color:'#38bdf8'}}>{fmt(p.precio)} / {p.unidad}</div>
          </div>
          <BFill onClick={()=>addCart(p)} style={{padding:'5px 12px',fontSize:12}}>+ Agregar</BFill>
        </Row>)}
      </div>}
    </Card>
    {cart.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>RESUMEN DEL PEDIDO</div>
      {cart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.nombre}</div>
          <div style={{fontSize:11,color:'#64748b'}}>{fmt(item.precio)} c/u</div>
        </div>
        <Row style={{gap:5,flexShrink:0}}>
          <button onClick={()=>updQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
          <span style={{minWidth:22,textAlign:'center',fontWeight:700,fontSize:14}}>{item.cant}</span>
          <button onClick={()=>updQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
        </Row>
        <div style={{minWidth:62,textAlign:'right',fontWeight:700,color:'#38bdf8',fontSize:13}}>{fmt(item.precio*item.cant)}</div>
      </Row>)}
      <div style={{borderTop:'1px solid #334155',paddingTop:10,marginTop:4,marginBottom:12}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700,fontSize:15}}>Total</span>
          <span style={{fontSize:22,fontWeight:800,color:'#38bdf8'}}>{fmt(total)}</span>
        </Row>
      </div>
      <Row style={{gap:8,marginBottom:12}}>
        {[['contado','💵 Contado','#166534','#4ade80'],['credito','📋 Crédito','#78350f','#fcd34d']].map(([v,l,bg,col])=>(
          <button key={v} onClick={()=>setPago(v)} style={{flex:1,padding:'9px',borderRadius:8,border:'none',background:pago===v?bg:'#0f172a',color:pago===v?col:'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
        ))}
      </Row>
      <Row style={{gap:8}}>
        <BFill onClick={guardar} bg={canSave?'#38bdf8':'#334155'} color={canSave?'#0f172a':'#64748b'} style={{flex:1}} disabled={!canSave}>💾 Guardar pedido</BFill>
        {cliente?.telefono&&<BFill onClick={()=>window.open(makeWA(cliente,cart,total,pago),'_blank')} bg="#25d366" style={{padding:'8px 16px',fontSize:18}}>📲</BFill>}
      </Row>
    </Card>}
  </div>;
}

/* ── Créditos ── */
function Creditos({creditos,setCreditos}){
  const [abonoId,setAbonoId]=useState(null);
  const [monto,setMonto]=useState('');
  const pend=creditos.filter(c=>c.saldo>0);
  const totalPend=pend.reduce((s,c)=>s+c.saldo,0);
  const abonar=id=>{
    const m=parseFloat(monto); if(!m||m<=0) return;
    setCreditos(cs=>cs.map(c=>c.id!==id?c:{...c,saldo:Math.max(0,c.saldo-m),abonos:[...c.abonos,{fecha:new Date().toISOString(),monto:m}]}));
    setMonto(''); setAbonoId(null);
  };
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>💳 Créditos</div>
    <Card style={{borderLeft:'3px solid #f59e0b',marginBottom:14}}>
      <div style={{fontSize:12,color:'#94a3b8'}}>Total pendiente</div>
      <div style={{fontSize:28,fontWeight:800,color:'#f59e0b'}}>{fmt(totalPend)}</div>
      <div style={{fontSize:11,color:'#64748b'}}>{pend.length} cuenta(s)</div>
    </Card>
    {pend.length===0&&<div style={{textAlign:'center',color:'#475569',fontSize:14,paddingTop:20}}>Sin créditos pendientes ✅</div>}
    {pend.map(c=><Card key={c.id}>
      <Row style={{justifyContent:'space-between',marginBottom:8}}>
        <div><div style={{fontWeight:700,fontSize:14}}>{c.clienteNombre}</div><div style={{fontSize:11,color:'#64748b'}}>{fDate(c.fecha)}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:18,fontWeight:800,color:'#f59e0b'}}>{fmt(c.saldo)}</div><div style={{fontSize:11,color:'#64748b'}}>de {fmt(c.total)}</div></div>
      </Row>
      <div style={{background:'#0f172a',borderRadius:10,height:6,marginBottom:10}}>
        <div style={{background:'#22c55e',borderRadius:10,height:6,width:`${Math.round((c.total-c.saldo)/c.total*100)}%`}}/>
      </div>
      {c.abonos.length>0&&<div style={{marginBottom:10,paddingTop:6,borderTop:'1px solid #334155'}}>
        <div style={{fontSize:11,color:'#64748b',marginBottom:4,fontWeight:700}}>ABONOS</div>
        {c.abonos.map((a,i)=><Row key={i} style={{justifyContent:'space-between',fontSize:12,marginBottom:3}}>
          <span style={{color:'#94a3b8'}}>{fDate(a.fecha)}</span>
          <span style={{color:'#22c55e',fontWeight:700}}>+{fmt(a.monto)}</span>
        </Row>)}
      </div>}
      {abonoId===c.id?<Row style={{gap:8}}>
        <Inp type="number" placeholder="Monto abono…" value={monto} onChange={e=>setMonto(e.target.value)} style={{flex:1}}/>
        <BFill onClick={()=>abonar(c.id)} bg="#22c55e" color="#0f172a" style={{padding:'8px 14px'}}>✓</BFill>
        <button onClick={()=>{setAbonoId(null);setMonto('');}} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',display:'flex'}}><XI size={18}/></button>
      </Row>:<BOut onClick={()=>setAbonoId(c.id)} color="#22c55e" style={{width:'100%'}}>+ Registrar abono</BOut>}
    </Card>)}
  </div>;
}

/* ── Ruta de reparto ── */
function RutaReparto({productos,rutas,setRutas}){
  const [scanOpen,setScanOpen]=useState(false);
  const [cart,setCart]=useState([]);
  const [msg,setMsg]=useState('');
  const flash=m=>{ setMsg(m); setTimeout(()=>setMsg(''),2500); };
  const handleScan=code=>{
    setScanOpen(false);
    const p=productos.find(x=>x.codigoBarras&&x.codigoBarras===code);
    if(!p){ flash('⚠️ Código no encontrado: '+code); return; }
    setCart(c=>{
      const ex=c.find(x=>x.id===p.id);
      return ex?c.map(x=>x.id===p.id?{...x,cant:x.cant+1}:x):[...c,{id:p.id,nombre:p.nombre,unidad:p.unidad,cant:1}];
    });
    flash('✅ '+p.nombre+' agregado');
  };
  const updQty=(id,v)=>{ if(v<1){setCart(c=>c.filter(x=>x.id!==id));return;} setCart(c=>c.map(x=>x.id===id?{...x,cant:v}:x)); };
  const guardarRuta=()=>{
    if(cart.length===0) return;
    setRutas(rs=>[{id:uid(),fecha:new Date().toISOString(),items:cart},...rs]);
    setCart([]); flash('✅ Ruta guardada');
  };
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>🚚 Ruta de reparto</div>
    {msg&&<div style={{background:'#14532d',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#4ade80',marginBottom:12}}>{msg}</div>}
    <Card>
      <BFill onClick={()=>setScanOpen(true)} style={{width:'100%',fontSize:14,padding:12}}>📷 Escanear producto</BFill>
      <div style={{fontSize:11,color:'#64748b',marginTop:8,textAlign:'center'}}>Escanea el código de barras de cada producto que se cargue en la ruta; se agregará automáticamente.</div>
    </Card>
    {cart.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>PRODUCTOS ESCANEADOS ({cart.reduce((s,x)=>s+x.cant,0)})</div>
      {cart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600}}>{item.nombre}</div>
          <div style={{fontSize:11,color:'#64748b'}}>{item.unidad}</div>
        </div>
        <Row style={{gap:5}}>
          <button onClick={()=>updQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
          <span style={{minWidth:22,textAlign:'center',fontWeight:700,fontSize:14}}>{item.cant}</span>
          <button onClick={()=>updQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
        </Row>
      </Row>)}
      <BFill onClick={guardarRuta} style={{width:'100%',marginTop:6}}>💾 Guardar ruta</BFill>
    </Card>}
    {rutas.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>RUTAS GUARDADAS</div>
      {rutas.map(r=><div key={r.id} style={{paddingBottom:8,borderBottom:'1px solid #0f172a',marginBottom:8}}>
        <Row style={{justifyContent:'space-between',marginBottom:4}}>
          <span style={{fontSize:12,color:'#94a3b8'}}>{fDate(r.fecha)}</span>
          <Tag color="#64748b">{r.items.reduce((s,x)=>s+x.cant,0)} artículos</Tag>
        </Row>
        {r.items.map(it=><div key={it.id} style={{fontSize:12,color:'#cbd5e1'}}>• {it.nombre} x{it.cant}</div>)}
      </div>)}
    </Card>}
    {scanOpen&&<BarcodeScanner onDetected={handleScan} onClose={()=>setScanOpen(false)}/>}
  </div>;
}

/* ── Configuración ── */
function Configuracion({users,setUsers,currentUser,setCurrentUser,onBack,onLogout}){
  const [sub,setSub]=useState('perfil');
  const [form,setForm]=useState(null);
  const [pw,setPw]=useState({old:'',new_:'',conf:''});
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');
  const isAdmin=currentUser.role==='admin';
  const flash=(m,isErr=false)=>{ isErr?setErr(m):setMsg(m); setTimeout(()=>{setErr('');setMsg('');},3000); };
  const changePw=()=>{
    if(pw.old!==currentUser.password){flash('Contraseña actual incorrecta',true);return;}
    if(pw.new_.length<4){flash('Mínimo 4 caracteres',true);return;}
    if(pw.new_!==pw.conf){flash('Las contraseñas no coinciden',true);return;}
    setUsers(us=>us.map(u=>u.id===currentUser.id?{...u,password:pw.new_}:u));
    setCurrentUser(u=>({...u,password:pw.new_}));
    setPw({old:'',new_:'',conf:''}); flash('✅ Contraseña actualizada');
  };
  const saveUser=()=>{
    if(!form.username||!form.nombre||!form.password){flash('Completa todos los campos',true);return;}
    if(!form.id&&users.find(u=>u.username===form.username)){flash('Ese usuario ya existe',true);return;}
    if(form.id) setUsers(us=>us.map(u=>u.id===form.id?{...form}:u));
    else setUsers(us=>[...us,{...form,id:uid()}]);
    setForm(null); flash('✅ Usuario guardado');
  };
  const delUser=id=>{ if(id===currentUser.id){flash('No puedes eliminarte',true);return;} setUsers(us=>us.filter(u=>u.id!==id)); flash('Usuario eliminado'); };
  return <div style={{padding:'16px 12px'}}>
    <Row style={{marginBottom:16}}>
      <button onClick={onBack} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:22,padding:'0 4px 0 0',lineHeight:1}}>←</button>
      <div style={{fontSize:20,fontWeight:800}}>⚙️ Configuración</div>
    </Row>
    {msg&&<div style={{background:'#14532d',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#4ade80',marginBottom:12}}>{msg}</div>}
    {err&&<div style={{background:'#450a0a',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#fca5a5',marginBottom:12}}>{err}</div>}
    <Row style={{gap:6,marginBottom:16}}>
      {[['perfil','👤 Perfil'],['password','🔑 Contraseña'],...(isAdmin?[['usuarios','👥 Usuarios']]:[])].map(([v,l])=>(
        <button key={v} onClick={()=>{setSub(v);setErr('');setMsg('');}} style={{flex:1,padding:'8px 2px',borderRadius:8,border:'none',background:sub===v?'#38bdf8':'#1e293b',color:sub===v?'#0f172a':'#94a3b8',fontSize:11,fontWeight:700,cursor:'pointer'}}>{l}</button>
      ))}
    </Row>
    {sub==='perfil'&&<>
      <Card>
        <div style={{textAlign:'center',padding:'12px 0 16px'}}>
          <div style={{fontSize:52,marginBottom:8}}>👤</div>
          <div style={{fontSize:18,fontWeight:700}}>{currentUser.nombre}</div>
          <div style={{fontSize:13,color:'#94a3b8',marginTop:2}}>@{currentUser.username}</div>
          <div style={{fontSize:12,color:'#64748b',marginTop:2}}>✉️ {currentUser.email||'Sin correo registrado'}</div>
          <Tag color={currentUser.role==='admin'?'#a78bfa':'#38bdf8'} style={{marginTop:8,display:'inline-block'}}>{currentUser.role}</Tag>
        </div>
      </Card>
      <BOut onClick={onLogout} color="#ef4444" style={{width:'100%',marginTop:8}}>🚪 Cerrar sesión</BOut>
    </>}
    {sub==='password'&&<Card>
      <Lbl>Contraseña actual</Lbl><PwInp value={pw.old} onChange={e=>setPw(f=>({...f,old:e.target.value}))}/>
      <Lbl>Nueva contraseña</Lbl><PwInp value={pw.new_} onChange={e=>setPw(f=>({...f,new_:e.target.value}))}/>
      <Lbl>Confirmar</Lbl><PwInp value={pw.conf} onChange={e=>setPw(f=>({...f,conf:e.target.value}))}/>
      <BFill onClick={changePw} style={{width:'100%',marginTop:6}}>🔑 Actualizar contraseña</BFill>
    </Card>}
    {sub==='usuarios'&&isAdmin&&<>
      <Row style={{justifyContent:'flex-end',marginBottom:10}}>
        <BFill onClick={()=>setForm({username:'',nombre:'',password:'',role:'usuario',email:''})}>+ Nuevo usuario</BFill>
      </Row>
      {users.map(u=><Card key={u.id}>
        <Row style={{justifyContent:'space-between'}}>
          <div>
            <Row style={{gap:6,flexWrap:'wrap'}}>
              <span style={{fontWeight:700,fontSize:14}}>{u.nombre}</span>
              <Tag color={u.role==='admin'?'#a78bfa':'#38bdf8'}>{u.role}</Tag>
              {u.id===currentUser.id&&<Tag color="#22c55e">Tú</Tag>}
            </Row>
            <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>@{u.username}</div>
            {u.email&&<div style={{fontSize:11,color:'#64748b',marginTop:1}}>✉️ {u.email}</div>}
          </div>
          <Row style={{gap:4}}>
            <button onClick={()=>setForm({...u,email:u.email||''})} style={{background:'#172554',border:'none',color:'#60a5fa',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>✏️</button>
            {u.id!==currentUser.id&&<button onClick={()=>delUser(u.id)} style={{background:'#450a0a',border:'none',color:'#f87171',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>🗑</button>}
          </Row>
        </Row>
      </Card>)}
    </>}
    {form&&<Modal title={form.id?'Editar Usuario':'Nuevo Usuario'} onClose={()=>{setForm(null);setErr('');}}>
      <Lbl>Nombre completo</Lbl><Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Lbl>Usuario</Lbl><Inp value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} style={{marginBottom:10}}/>
      <Lbl>Correo electrónico</Lbl><Inp type="email" value={form.email||''} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="correo@ejemplo.com" style={{marginBottom:10}}/>
      <Lbl>Contraseña</Lbl><PwInp value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
      <Lbl>Rol</Lbl>
      <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={{background:'#0f172a',border:'1px solid #334155',borderRadius:8,padding:'8px 10px',color:'#f1f5f9',fontSize:13,width:'100%',marginBottom:16}}>
        <option value="usuario">usuario</option><option value="admin">admin</option>
      </select>
      <BFill onClick={saveUser} style={{width:'100%'}}>💾 Guardar</BFill>
    </Modal>}
  </div>;
}

/* ── App Root ── */
function App(){
  const [tab,setTab]=useState('home');
  const [prevTab,setPrevTab]=useState('home');
  const [currentUser,setCurrentUser]=useState(null);
  const [users,setUsers]=useState(DEF_USERS);
  const [productos,setProductos]=useState(S_PROD);
  const [clientes,setClientes]=useState(S_CLI);
  const [notas,setNotas]=useState([]);
  const [creditos,setCreditos]=useState([]);
  const [rutas,setRutas]=useState([]);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    try{
      const u=store.get('da:users'); if(u) setUsers(u);
      const p=store.get('da:productos'); if(p) setProductos(p);
      const c=store.get('da:clientes'); if(c) setClientes(c);
      const n=store.get('da:notas'); if(n) setNotas(n);
      const cr=store.get('da:creditos'); if(cr) setCreditos(cr);
      const rt=store.get('da:rutas'); if(rt) setRutas(rt);
    }catch{}
    setLoaded(true);
  },[]);

  useEffect(()=>{ if(loaded) store.set('da:users',users); },[users,loaded]);
  useEffect(()=>{ if(loaded) store.set('da:productos',productos); },[productos,loaded]);
  useEffect(()=>{ if(loaded) store.set('da:clientes',clientes); },[clientes,loaded]);
  useEffect(()=>{ if(loaded) store.set('da:notas',notas); },[notas,loaded]);
  useEffect(()=>{ if(loaded) store.set('da:creditos',creditos); },[creditos,loaded]);
  useEffect(()=>{ if(loaded) store.set('da:rutas',rutas); },[rutas,loaded]);

  const goConfig=()=>{ if(tab!=='config') setPrevTab(tab); setTab('config'); };
  const logout=()=>{ setCurrentUser(null); setTab('home'); };
  const ctx={productos,setProductos,clientes,setClientes,notas,setNotas,creditos,setCreditos,rutas,setRutas};
  const TABS=[['home','🏠','Inicio'],['productos','📦','Productos'],['nota','🧾','Pedido'],['clientes','👥','Clientes'],['creditos','💳','Créditos'],['ruta','🚚','Ruta']];

  if(!loaded) return <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:'100vh',color:'#94a3b8',fontSize:14}}>Cargando…</div>;
  if(!currentUser) return <Login users={users} onLogin={setCurrentUser}/>;

  return <div style={{minHeight:'100vh',position:'relative',paddingTop:50,paddingBottom:tab==='config'?24:72}}>
    <div style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:420,background:'#0f172a',borderBottom:'1px solid #1e293b',zIndex:100,height:50,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',boxSizing:'border-box'}}>
      <div style={{fontSize:15,fontWeight:800,color:'#38bdf8'}}>🚚 Productos de la Costa</div>
      <Row style={{gap:6}}>
        <span style={{fontSize:12,color:'#475569'}}>Hola, {currentUser.nombre.split(' ')[0]}</span>
        <button onClick={goConfig} style={{background:tab==='config'?'#1e293b':'none',border:'none',color:tab==='config'?'#38bdf8':'#64748b',cursor:'pointer',borderRadius:8,padding:'5px 7px',display:'flex',alignItems:'center'}}>
          <Gear/>
        </button>
      </Row>
    </div>
    {tab==='home'&&<Dashboard {...ctx}/>}
    {tab==='productos'&&<Productos {...ctx}/>}
    {tab==='nota'&&<CrearNota {...ctx}/>}
    {tab==='clientes'&&<Clientes {...ctx}/>}
    {tab==='creditos'&&<Creditos {...ctx}/>}
    {tab==='ruta'&&<RutaReparto {...ctx}/>}
    {tab==='config'&&<Configuracion users={users} setUsers={setUsers} currentUser={currentUser} setCurrentUser={setCurrentUser} onBack={()=>setTab(prevTab)} onLogout={logout}/>}
    {tab!=='config'&&<nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:420,background:'#1e293b',borderTop:'1px solid #334155',display:'flex',zIndex:200}}>
      {TABS.map(([id,ico,lbl])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'10px 2px 7px',background:'none',border:'none',color:tab===id?'#38bdf8':'#64748b',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,fontSize:10,fontWeight:tab===id?700:400}}>
          <span style={{fontSize:22,lineHeight:1}}>{ico}</span>{lbl}
        </button>
      ))}
    </nav>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
